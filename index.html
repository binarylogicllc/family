<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Islamic Inheritance Divider — حساب الميراث</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#FAF6EF;font-family:'Segoe UI',system-ui,sans-serif;color:#2A2018}
  input,select,button{font-family:inherit}
  input:focus,select:focus{outline:2px solid #B03818;outline-offset:1px}
  table{border-collapse:collapse}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .3s ease}
  .spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ── Local storage (token only — never share this) ─────────
const LS = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

const uid = () => Math.random().toString(36).slice(2,8);
const fmtOMR = n => `OMR ${Math.round(n).toLocaleString("en")}`;
const fmtPct = n => `${(n*100).toFixed(1)}%`;

const ROLE = {
  father:  {emoji:"👨",   label:"Father (Surviving)",color:"#2D5FA5",bg:"#EBF2FA",bd:"#90AEDE"},
  mother:  {emoji:"👩",   label:"Mother (Surviving)",color:"#7040A0",bg:"#F3EEF8",bd:"#BC98E0"},
  son:     {emoji:"🧑",   label:"Brother",           color:"#2A6840",bg:"#ECF6F0",bd:"#7DC49A"},
  daughter:{emoji:"👩‍🦱",label:"Sister",            color:"#B03818",bg:"#FAF0EB",bd:"#DA9070"},
};

// ── XML helpers ───────────────────────────────────────────
function toXML(heirs, lands) {
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  return `<?xml version="1.0" encoding="UTF-8"?>
<inheritance>
  <heirs>
${heirs.map(h=>`    <heir id="${esc(h.id)}" name="${esc(h.name)}" role="${esc(h.role)}"/>`).join("\n")}
  </heirs>
  <lands>
${lands.map(l=>`    <land id="${esc(l.id)}" name="${esc(l.name)}" value="${l.value}" location="${esc(l.loc||"")}"/>`).join("\n")}
  </lands>
</inheritance>`;
}

function fromXML(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, "application/xml");
  if (doc.querySelector("parsererror")) throw new Error("Invalid XML");
  return {
    heirs: [...doc.querySelectorAll("heir")].map(n=>({id:n.getAttribute("id")||uid(),name:n.getAttribute("name")||"",role:n.getAttribute("role")||"son"})),
    lands: [...doc.querySelectorAll("land")].map(n=>({id:n.getAttribute("id")||uid(),name:n.getAttribute("name")||"",value:parseFloat(n.getAttribute("value"))||0,loc:n.getAttribute("location")||""})),
  };
}

// ── GitHub API ────────────────────────────────────────────
const DATA_FILE = "inheritance_data.xml";

async function ghGet(cfg) {
  const res = await fetch(
    `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,
    {headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json"}}
  );
  if (res.status === 404) return null;          // file doesn't exist yet
  if (!res.ok) throw new Error(`GitHub error ${res.status}`);
  const json = await res.json();
  return { content: atob(json.content.replace(/\n/g,"")), sha: json.sha };
}

async function ghPut(cfg, xmlStr, sha) {
  const body = {
    message: sha ? "Update inheritance data" : "Create inheritance data",
    content: btoa(unescape(encodeURIComponent(xmlStr))),
    ...(sha ? {sha} : {}),
  };
  const res = await fetch(
    `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,
    {method:"PUT",headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)}
  );
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `GitHub error ${res.status}`);
  }
  const json = await res.json();
  return json.content.sha;
}

// ── Islamic calculation ───────────────────────────────────
function islamicShares(heirs){
  const father=heirs.find(h=>h.role==="father"),mother=heirs.find(h=>h.role==="mother");
  const sons=heirs.filter(h=>h.role==="son"),daus=heirs.filter(h=>h.role==="daughter");
  const kids=[...sons,...daus]; const out={}; let pool=1;
  if(father){const s=kids.length?1/4:1/2;out[father.id]=s;pool-=s;}
  if(mother){const s=kids.length?1/8:1/4;out[mother.id]=s;pool-=s;}
  if(kids.length&&pool>0){
    const u=sons.length*2+daus.length;
    sons.forEach(s=>{out[s.id]=(2/u)*pool;});
    daus.forEach(d=>{out[d.id]=(1/u)*pool;});
  }
  return out;
}
function divideLand(val,ids,gs){
  let tw=0;const ws={};ids.forEach(id=>{ws[id]=gs[id]||0;tw+=ws[id];});
  const out={};ids.forEach(id=>{out[id]=tw>0?(ws[id]/tw)*val:0;});return out;
}
function settle(heirs,balance){
  const P=heirs.filter(h=>balance[h.id]>1).map(h=>({...h,amt:balance[h.id]}));
  const R=heirs.filter(h=>balance[h.id]<-1).map(h=>({...h,amt:-balance[h.id]}));
  const res=[];let pi=0,ri=0;
  while(pi<P.length&&ri<R.length){
    const a=Math.min(P[pi].amt,R[ri].amt);
    if(a>1)res.push({from:P[pi].name,fRole:P[pi].role,to:R[ri].name,tRole:R[ri].role,amount:a});
    P[pi].amt-=a;R[ri].amt-=a;
    if(P[pi].amt<1)pi++;if(R[ri].amt<1)ri++;
  }
  return res;
}

// ── UI primitives ─────────────────────────────────────────
function Card({children,style={}}){return <div style={{background:"#fff",borderRadius:12,border:"1px solid #EAE0D0",boxShadow:"0 2px 10px rgba(0,0,0,.05)",padding:20,...style}}>{children}</div>;}
function Btn({children,onClick,v="primary",disabled=false,sm=false}){
  const base={border:"none",borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontWeight:600,transition:"all .15s",fontSize:sm?12:14,padding:sm?"6px 12px":"10px 22px",opacity:disabled?.45:1,display:"inline-flex",alignItems:"center",gap:5};
  const vs={primary:{background:"#B03818",color:"#fff"},ghost:{background:"transparent",color:"#B03818",border:"1px solid #B03818"},green:{background:"#2A6840",color:"#fff"},soft:{background:"#F5EDE6",color:"#B03818",border:"1px solid #E8C8B8"},grey:{background:"#F0EBE3",color:"#6A5A48",border:"1px solid #DDD4C4"},blue:{background:"#1A4F7A",color:"#fff"}};
  return <button onClick={disabled?undefined:onClick} style={{...base,...vs[v]}}>{children}</button>;
}
function Inp({value,onChange,placeholder,type="text",style={}}){
  return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
    style={{border:"1px solid #E0D4C0",borderRadius:8,padding:"9px 13px",fontSize:14,background:"#FDFAF5",color:"#2A2018",width:"100%",...style}}/>;
}
const SL={fontSize:11,fontWeight:700,color:"#8A7060",marginBottom:12,textTransform:"uppercase",letterSpacing:".06em"};

function StepBar({cur,go,heirs,lands}){
  const steps=["Family","Lands","Interests","Results"];
  const can=[true,heirs.length>=2,heirs.length>=2&&lands.length>0,false];
  return(
    <div style={{display:"flex",alignItems:"flex-start",marginBottom:28,position:"relative"}}>
      <div style={{position:"absolute",top:15,left:"8%",right:"8%",height:2,background:"#E8DDD0",zIndex:0}}/>
      {steps.map((s,i)=>{
        const n=i+1,done=n<cur,active=n===cur,click=can[i]&&n!==cur;
        return(
          <div key={s} onClick={click?()=>go(n):undefined} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1,cursor:click?"pointer":"default"}}>
            <div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,background:done?"#2A6840":active?"#B03818":"#E8DDD0",color:done||active?"#fff":"#A8907A",boxShadow:active?"0 2px 8px rgba(176,56,24,.35)":"none",zIndex:1,position:"relative"}}>
              {done?"✓":n}
            </div>
            <span style={{fontSize:10,fontWeight:active?700:400,color:active?"#2A2018":"#B0907A"}}>{s}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Sync status badge ─────────────────────────────────────
function SyncBadge({status}){
  const map={
    idle:    null,
    loading: {bg:"#EBF2FA",bd:"#90AEDE",c:"#2D5FA5",txt:"⟳ Loading…",   spin:true},
    saving:  {bg:"#FFF8EE",bd:"#D4A840",c:"#8A6020",txt:"⟳ Saving…",    spin:true},
    saved:   {bg:"#ECF6F0",bd:"#7DC49A",c:"#2A6840",txt:"✓ Saved to GitHub"},
    error:   {bg:"#FEE8E0",bd:"#E4A090",c:"#B03818",txt:"⚠ Sync error"},
  };
  const m=map[status];
  if(!m)return null;
  return(
    <span className="pop" style={{fontSize:11,fontWeight:600,background:m.bg,border:`1px solid ${m.bd}`,color:m.c,borderRadius:20,padding:"3px 12px",display:"inline-flex",alignItems:"center",gap:5}}>
      {m.spin&&<span className="spin" style={{fontSize:13}}>⟳</span>}
      {m.txt}
    </span>
  );
}

// ── GitHub Settings panel ─────────────────────────────────
function GHSettings({cfg,onSave}){
  const [token,setToken]=useState(cfg.token||"");
  const [owner,setOwner]=useState(cfg.owner||"");
  const [repo, setRepo] =useState(cfg.repo||"");
  const [testing,setTesting]=useState(false);
  const [testMsg,setTestMsg]=useState("");

  async function testConnection(){
    setTesting(true);setTestMsg("");
    try{
      const res=await fetch(`https://api.github.com/repos/${owner}/${repo}`,
        {headers:{"Authorization":`token ${token}`}});
      if(res.ok){setTestMsg("✅ Connected successfully!");}
      else{setTestMsg(`❌ Error: ${res.status} — check token and repo name.`);}
    }catch(e){setTestMsg("❌ Network error — check your internet connection.");}
    setTesting(false);
  }

  return(
    <div style={{maxWidth:520,margin:"40px auto",padding:"0 16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:8}}>🕌</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:4}}>Islamic Inheritance Divider</div>
        <div style={{fontSize:13,color:"#8A7060"}}>حساب الميراث الإسلامي</div>
      </div>
      <Card>
        <div style={{...SL,color:"#1A4F7A",marginBottom:16}}>⚙️ GitHub Setup — One Time Only</div>
        <div style={{fontSize:13,color:"#6A5A48",marginBottom:20,lineHeight:1.7,background:"#F4F8FE",padding:"12px 14px",borderRadius:8,border:"1px solid #C0D4E8"}}>
          Your family data will be saved as a file inside your GitHub repo automatically — no imports or exports needed. Just set this up once.
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{...SL,marginBottom:6}}>GitHub Repo Owner</div>
            <Inp value={owner} onChange={setOwner} placeholder="e.g. binarylogicllc"/>
            <div style={{fontSize:11,color:"#A8907A",marginTop:4}}>Your GitHub username or organisation name</div>
          </div>
          <div>
            <div style={{...SL,marginBottom:6}}>Repository Name</div>
            <Inp value={repo} onChange={setRepo} placeholder="e.g. family"/>
            <div style={{fontSize:11,color:"#A8907A",marginTop:4}}>The repo where the app is hosted</div>
          </div>
          <div>
            <div style={{...SL,marginBottom:6}}>Personal Access Token</div>
            <Inp value={token} onChange={setToken} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" type="password"/>
            <div style={{fontSize:11,color:"#A8907A",marginTop:4,lineHeight:1.6}}>
              Create at <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained tokens</strong>.
              <br/>Give it <strong>Contents: Read and Write</strong> permission on this repo only.
            </div>
          </div>
        </div>

        {testMsg&&<div className="pop" style={{marginTop:14,padding:"8px 14px",borderRadius:8,fontSize:13,background:testMsg.startsWith("✅")?"#ECF6F0":"#FEE8E0",border:`1px solid ${testMsg.startsWith("✅")?"#7DC49A":"#E4A090"}`,color:testMsg.startsWith("✅")?"#2A6840":"#B03818"}}>{testMsg}</div>}

        <div style={{display:"flex",gap:10,marginTop:20}}>
          <Btn v="grey" onClick={testConnection} disabled={!token||!owner||!repo||testing}>{testing?"Testing…":"Test Connection"}</Btn>
          <Btn v="blue" onClick={()=>onSave({token,owner,repo})} disabled={!token||!owner||!repo}>Save & Continue →</Btn>
        </div>
      </Card>

      <div style={{marginTop:16,padding:"12px 16px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",fontSize:11,color:"#8A6020",lineHeight:1.7}}>
        🔒 <strong>Your token is stored only in your browser</strong> (localStorage). It never leaves your device except to talk directly to GitHub's API. Use a fine-grained token with only the permissions listed above.
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App(){
  const [cfg,setCfg]=useState(()=>LS.get("gh_cfg",{}));
  const [step,setStep]=useState(1);
  const [heirs,setHeirs]=useState([]);
  const [lands,setLands]=useState([]);
  const [ints,setInts]=useState({});
  const [fileSha,setFileSha]=useState(null);
  const [sync,setSync]=useState("idle");
  const [syncErr,setSyncErr]=useState("");
  const saveTimer=useRef(null);

  const [hName,setHName]=useState("");const [hRole,setHRole]=useState("son");const [editH,setEditH]=useState(null);
  const [lName,setLName]=useState("");const [lVal,setLVal]=useState("");const [lLoc,setLLoc]=useState("");const [editL,setEditL]=useState(null);

  const isConfigured = !!(cfg.token && cfg.owner && cfg.repo);

  // ── Load from GitHub on startup ───────────────────────
  useEffect(()=>{
    if(!isConfigured)return;
    setSync("loading");
    ghGet(cfg).then(result=>{
      if(result){
        try{
          const {heirs:h,lands:l}=fromXML(result.content);
          setHeirs(h);setLands(l);setFileSha(result.sha);
          if(h.length>=2&&l.length>0)setStep(3);
        }catch(e){setSyncErr("Could not parse saved data: "+e.message);}
      }
      setSync("idle");
    }).catch(e=>{setSync("error");setSyncErr(e.message);});
  },[isConfigured]);

  // ── Auto-save to GitHub (debounced 1.5s) ─────────────
  const autoSave = useCallback((h,l,sha)=>{
    if(!isConfigured||(!h.length&&!l.length))return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      setSync("saving");
      try{
        const newSha=await ghPut(cfg,toXML(h,l),sha);
        setFileSha(newSha);
        setSync("saved");
        setTimeout(()=>setSync("idle"),2500);
      }catch(e){setSync("error");setSyncErr(e.message);}
    },1500);
  },[isConfigured,cfg]);

  // Trigger save when heirs or lands change
  useEffect(()=>{ if(isConfigured&&(heirs.length||lands.length)) autoSave(heirs,lands,fileSha); },[heirs,lands]);

  function saveConfig(c){LS.set("gh_cfg",c);setCfg(c);}

  const shares=useMemo(()=>islamicShares(heirs),[heirs]);
  const estate=useMemo(()=>lands.reduce((s,l)=>s+l.value,0),[lands]);

  function addHeir(){
    if(!hName.trim())return;
    if((hRole==="father"||hRole==="mother")&&heirs.find(h=>h.role===hRole))return;
    setHeirs(p=>[...p,{id:uid(),name:hName.trim(),role:hRole}]);setHName("");
  }
  function saveH(id){setHeirs(p=>p.map(h=>h.id===id?{...h,name:hName.trim(),role:hRole}:h));setEditH(null);setHName("");setHRole("son");}
  function startH(h){setEditH(h.id);setHName(h.name);setHRole(h.role);}
  function addLand(){
    const v=parseFloat(lVal);if(!lName.trim()||isNaN(v)||v<=0)return;
    setLands(p=>[...p,{id:uid(),name:lName.trim(),value:v,loc:lLoc.trim()}]);setLName("");setLVal("");setLLoc("");
  }
  function saveL(id){
    const v=parseFloat(lVal);if(!lName.trim()||isNaN(v)||v<=0)return;
    setLands(p=>p.map(l=>l.id===id?{...l,name:lName.trim(),value:v,loc:lLoc.trim()}:l));setEditL(null);setLName("");setLVal("");setLLoc("");
  }
  function startL(l){setEditL(l.id);setLName(l.name);setLVal(String(l.value));setLLoc(l.loc||"");}
  function toggleInt(lid,hid){setInts(p=>({...p,[lid]:{...(p[lid]||{}),[hid]:!(p[lid]?.[hid])}}));}

  const results=useMemo(()=>{
    if(!heirs.length||!lands.length)return null;
    const alloc={};heirs.forEach(h=>{alloc[h.id]=0;});
    const bdown={};
    lands.forEach(land=>{
      const ids=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);
      if(!ids.length){bdown[land.id]={};return;}
      const a=divideLand(land.value,ids,shares);bdown[land.id]=a;
      Object.entries(a).forEach(([id,amt])=>{alloc[id]=(alloc[id]||0)+amt;});
    });
    const right={};heirs.forEach(h=>{right[h.id]=(shares[h.id]||0)*estate;});
    const bal={};heirs.forEach(h=>{bal[h.id]=alloc[h.id]-right[h.id];});
    return{alloc,right,bal,settlements:settle(heirs,bal),bdown};
  },[heirs,lands,ints,shares,estate]);

  // ── Show setup screen if not configured ──────────────
  if(!isConfigured) return <GHSettings cfg={cfg} onSave={saveConfig}/>;

  return(
    <div style={{background:"#FAF6EF",minHeight:"100vh",paddingBottom:60}}>

      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #EAE0D0",padding:"14px 22px",boxShadow:"0 1px 6px rgba(0,0,0,.06)",marginBottom:24}}>
        <div style={{maxWidth:740,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:24}}>🕌</span>
            <div>
              <div style={{fontWeight:800,fontSize:17}}>Islamic Inheritance Divider</div>
              <div style={{fontSize:11,color:"#A8907A"}}>حساب الميراث الإسلامي · {cfg.owner}/{cfg.repo}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <SyncBadge status={sync}/>
            {sync==="error"&&<span style={{fontSize:11,color:"#B03818"}}>{syncErr}</span>}
            <Btn sm v="grey" onClick={()=>{LS.set("gh_cfg",{});setCfg({});}}>⚙️ Settings</Btn>
          </div>
        </div>
      </div>

      {/* Loading state */}
      {sync==="loading"&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#8A7060"}}>
          <div style={{fontSize:32,marginBottom:12}} className="spin">⟳</div>
          <div style={{fontWeight:600}}>Loading your data from GitHub…</div>
        </div>
      )}

      {sync!=="loading"&&(
      <div style={{maxWidth:740,margin:"0 auto",padding:"0 16px"}}>
        <StepBar cur={step} go={setStep} heirs={heirs} lands={lands}/>

        {/* STEP 1 */}
        {step===1&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>👨‍👩‍👧‍👦 Family Members</div>
              <div style={{fontSize:13,color:"#8A7060"}}>Changes save to GitHub automatically. Add surviving parent(s) first, then brothers and sisters.</div>
            </div>
            <Card style={{marginBottom:14}}>
              <div style={SL}>{editH?"✏️ Edit":"Add a Heir"}</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <Inp value={hName} onChange={setHName} placeholder="Full name" style={{flex:"1 1 150px"}}/>
                <select value={hRole} onChange={e=>setHRole(e.target.value)}
                  style={{flex:"1 1 160px",border:"1px solid #E0D4C0",borderRadius:8,padding:"9px 12px",fontSize:14,background:"#FDFAF5",color:"#2A2018"}}>
                  {Object.entries(ROLE).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
                </select>
                {editH?<><Btn v="green" onClick={()=>saveH(editH)}>Save</Btn><Btn v="grey" sm onClick={()=>{setEditH(null);setHName("");setHRole("son");}}>Cancel</Btn></>
                      :<Btn v="green" onClick={addHeir}>+ Add</Btn>}
              </div>
            </Card>
            {heirs.length>0&&(
              <Card style={{marginBottom:20}}>
                <div style={{...SL,marginBottom:14}}>Heirs ({heirs.length})</div>
                {heirs.map(h=>{const r=ROLE[h.role];return(
                  <div key={h.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#FAF6EF",borderRadius:8,border:`1px solid ${editH===h.id?"#B03818":"#EAE0D0"}`,marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>{r.emoji}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{h.name}</div>
                        <div style={{fontSize:11,color:"#A8907A"}}>{r.label} · <span style={{color:r.color,fontWeight:700}}>{fmtPct(shares[h.id]||0)}</span></div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>startH(h)} style={{background:"none",border:"1px solid #DDD4C4",borderRadius:6,cursor:"pointer",color:"#8A7060",fontSize:13,padding:"3px 8px"}}>✏️</button>
                      <button onClick={()=>setHeirs(p=>p.filter(x=>x.id!==h.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#D4907A",fontSize:16}}>✕</button>
                    </div>
                  </div>
                );})}
                <div style={{marginTop:12,padding:"12px 14px",background:"#F5EDE6",borderRadius:8,border:"1px solid #E8D4C0"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#8A7060",marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>📖 Islamic Shares Applied</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {heirs.map(h=>(
                      <div key={h.id} style={{background:ROLE[h.role].bg,border:`1px solid ${ROLE[h.role].bd}`,borderRadius:8,padding:"4px 12px",fontSize:12}}>
                        <span style={{color:ROLE[h.role].color,fontWeight:700}}>{h.name}</span>
                        <span style={{color:"#8A7060"}}> {fmtPct(shares[h.id]||0)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </Card>
            )}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <Btn onClick={()=>setStep(2)} disabled={heirs.length<2}>Next: Lands →</Btn>
            </div>
          </div>
        )}

        {/* STEP 2 */}
        {step===2&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>🏡 Inherited Lands</div>
              <div style={{fontSize:13,color:"#8A7060"}}>Changes save to GitHub automatically.</div>
            </div>
            <Card style={{marginBottom:14}}>
              <div style={SL}>{editL?"✏️ Edit":"Add a Land"}</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <Inp value={lName} onChange={setLName} placeholder="Land name" style={{flex:"2 1 140px"}}/>
                <Inp value={lLoc}  onChange={setLLoc}  placeholder="Location (optional)" style={{flex:"2 1 130px"}}/>
                <Inp value={lVal}  onChange={setLVal}  placeholder="Value in OMR" type="number" style={{flex:"1 1 110px"}}/>
                {editL?<><Btn v="green" onClick={()=>saveL(editL)}>Save</Btn><Btn v="grey" sm onClick={()=>{setEditL(null);setLName("");setLVal("");setLLoc("");}}>Cancel</Btn></>
                      :<Btn v="green" onClick={addLand}>+ Add</Btn>}
              </div>
            </Card>
            {lands.length>0&&(
              <Card style={{marginBottom:20}}>
                <div style={{...SL,marginBottom:14}}>Lands ({lands.length})</div>
                {lands.map((l,i)=>(
                  <div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",background:i%2===0?"#FAF6EF":"#fff",borderRadius:8,border:`1px solid ${editL===l.id?"#B03818":"#EAE0D0"}`,marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>🗺️</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{l.name}</div>
                        <div style={{fontSize:12,color:"#8A7060"}}>{l.loc&&<span style={{marginRight:8}}>📍{l.loc}</span>}<strong style={{color:"#B03818"}}>{fmtOMR(l.value)}</strong></div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>startL(l)} style={{background:"none",border:"1px solid #DDD4C4",borderRadius:6,cursor:"pointer",color:"#8A7060",fontSize:13,padding:"3px 8px"}}>✏️</button>
                      <button onClick={()=>setLands(p=>p.filter(x=>x.id!==l.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#D4907A",fontSize:16}}>✕</button>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:10,padding:"10px 14px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,color:"#8A6020"}}>Total Estate</span>
                  <span style={{fontWeight:800,fontSize:16,color:"#6A4810"}}>{fmtOMR(estate)}</span>
                </div>
              </Card>
            )}
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <Btn v="ghost" onClick={()=>setStep(1)}>← Family</Btn>
              <Btn onClick={()=>setStep(3)} disabled={lands.length===0}>Next: Interests →</Btn>
            </div>
          </div>
        )}

        {/* STEP 3 */}
        {step===3&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>☑️ Who Wants Which Land?</div>
              <div style={{fontSize:13,color:"#8A7060"}}>Tap each person who wants a share. Live preview updates instantly.</div>
            </div>
            <div style={{padding:"10px 14px",background:"#F0EDE6",borderRadius:8,border:"1px solid #E0D4C4",marginBottom:14,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:"#8A7060",textTransform:"uppercase",letterSpacing:".05em"}}>Heirs:</span>
              {heirs.map(h=>(
                <span key={h.id} style={{fontSize:12,padding:"2px 10px",borderRadius:20,background:ROLE[h.role].bg,color:ROLE[h.role].color,border:`1px solid ${ROLE[h.role].bd}`,fontWeight:600}}>
                  {ROLE[h.role].emoji} {h.name} · {fmtPct(shares[h.id]||0)}
                </span>
              ))}
            </div>
            {lands.map(land=>{
              const intIds=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);
              const prev=intIds.length>0?divideLand(land.value,intIds,shares):null;
              return(
                <Card key={land.id} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:16}}>🗺️ {land.name}</div>
                      <div style={{fontSize:12,color:"#8A7060",marginTop:2}}>{land.loc&&<span style={{marginRight:8}}>📍{land.loc}</span>}<strong style={{color:"#B03818"}}>{fmtOMR(land.value)}</strong></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"#A8907A"}}>Interested</div>
                      <div style={{fontWeight:800,fontSize:22,color:intIds.length>0?"#2A6840":"#C0907A"}}>{intIds.length}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {heirs.map(h=>{
                      const on=!!(ints[land.id]?.[h.id]),r=ROLE[h.role];
                      return(
                        <button key={h.id} onClick={()=>toggleInt(land.id,h.id)}
                          style={{border:`2px solid ${on?r.color:r.bd}`,background:on?r.bg:"#fff",borderRadius:10,padding:"8px 14px",cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:6,boxShadow:on?`0 2px 8px ${r.color}30`:"none",transform:on?"scale(1.03)":"scale(1)"}}>
                          <span style={{fontSize:16}}>{r.emoji}</span>
                          <div style={{textAlign:"left"}}>
                            <div style={{fontSize:13,fontWeight:700,color:on?r.color:"#6A5A4A"}}>{h.name}</div>
                            <div style={{fontSize:10,color:on?r.color:"#A8907A"}}>{on?"✓ Interested":"Tap to select"}</div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  {prev&&(
                    <div style={{marginTop:12,padding:"10px 12px",background:"#F7F4EE",borderRadius:8,border:"1px solid #E8DDD0"}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#8A7060",marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>Live split preview</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {intIds.map(id=>{const h=heirs.find(x=>x.id===id),r=ROLE[h.role];return <div key={id} style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:r.bg,color:r.color,border:`1px solid ${r.bd}`,fontWeight:600}}>{h.name}: {fmtOMR(prev[id])}</div>;})}
                      </div>
                    </div>
                  )}
                </Card>
              );
            })}
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
              <Btn v="ghost" onClick={()=>setStep(2)}>← Lands</Btn>
              <Btn onClick={()=>setStep(4)}>Calculate Results →</Btn>
            </div>
          </div>
        )}

        {/* STEP 4 */}
        {step===4&&results&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>📊 Inheritance Results</div>
              <div style={{fontSize:13,color:"#8A7060"}}>Islamic shares applied. Rightful = each heir's fair share of total estate.</div>
            </div>
            <Card style={{marginBottom:16}}>
              <div style={{...SL,marginBottom:14}}>💰 Per-Person Summary</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",fontSize:13}}>
                  <thead>
                    <tr style={{background:"#F5EDE6"}}>
                      {["Heir","Share %","Rightful","Allocated","Balance"].map(h=>(
                        <th key={h} style={{padding:"9px 10px",textAlign:h==="Heir"?"left":"right",fontWeight:700,color:"#6A5A48",fontSize:11,textTransform:"uppercase",letterSpacing:".04em",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {heirs.map((h,i)=>{
                      const b=results.bal[h.id],pos=b>50,neg=b<-50,r=ROLE[h.role];
                      return(
                        <tr key={h.id} style={{background:i%2===0?"#FAF6EF":"#fff",borderBottom:"1px solid #EDE5D8"}}>
                          <td style={{padding:"10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{r.emoji}</span><div><div style={{fontWeight:700}}>{h.name}</div><div style={{fontSize:11,color:r.color}}>{r.label}</div></div></div></td>
                          <td style={{padding:"10px",textAlign:"right",fontWeight:600,color:r.color,whiteSpace:"nowrap"}}>{fmtPct(shares[h.id]||0)}</td>
                          <td style={{padding:"10px",textAlign:"right",color:"#5A4A38",whiteSpace:"nowrap"}}>{fmtOMR(results.right[h.id])}</td>
                          <td style={{padding:"10px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap"}}>{fmtOMR(results.alloc[h.id])}</td>
                          <td style={{padding:"10px",textAlign:"right"}}>
                            <span style={{padding:"4px 8px",borderRadius:20,fontWeight:700,fontSize:11,whiteSpace:"nowrap",background:pos?"#FEE8E0":neg?"#E8F5EE":"#F0EDE6",color:pos?"#B03818":neg?"#2A6840":"#8A7060"}}>
                              {pos?`▲ Owes ${fmtOMR(b)}`:neg?`▼ Gets ${fmtOMR(-b)}`:"✓ Even"}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"#FFF8EE",borderTop:"2px solid #E8D898"}}>
                      <td colSpan={2} style={{padding:"10px",fontWeight:700,color:"#6A4810"}}>Total Estate</td>
                      <td style={{padding:"10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmtOMR(estate)}</td>
                      <td style={{padding:"10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmtOMR(Object.values(results.alloc).reduce((a,b)=>a+b,0))}</td>
                      <td/>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </Card>

            <Card style={{marginBottom:16}}>
              <div style={{...SL,marginBottom:14}}>🗺️ Land Breakdown</div>
              {lands.map(land=>{
                const bd=results.bdown[land.id]||{},ids=Object.keys(bd);
                if(!ids.length)return <div key={land.id} style={{padding:"10px 14px",marginBottom:10,borderRadius:8,background:"#F5F0E8",border:"1px solid #E8DDD0",color:"#A8907A",fontSize:13}}>🗺️ <strong>{land.name}</strong> — No one selected this land.</div>;
                return(
                  <div key={land.id} style={{marginBottom:12,padding:"12px 14px",borderRadius:10,background:"#FAF6EF",border:"1px solid #E8DDD0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div><span style={{fontWeight:700,fontSize:14}}>🗺️ {land.name}</span>{land.loc&&<span style={{fontSize:12,color:"#8A7060",marginLeft:8}}>📍{land.loc}</span>}</div>
                      <span style={{fontWeight:700,color:"#B03818"}}>{fmtOMR(land.value)}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {ids.map(id=>{const h=heirs.find(x=>x.id===id),r=ROLE[h.role];return(
                        <div key={id} style={{flex:"1 1 130px",padding:"8px 12px",borderRadius:8,background:r.bg,border:`1px solid ${r.bd}`}}>
                          <div style={{fontSize:11,color:r.color,fontWeight:700}}>{r.emoji} {h.name}</div>
                          <div style={{fontSize:15,fontWeight:800,color:"#2A2018",marginTop:2}}>{fmtOMR(bd[id])}</div>
                          <div style={{fontSize:10,color:"#A8907A"}}>{(bd[id]/land.value*100).toFixed(1)}% of land</div>
                        </div>
                      );})}
                    </div>
                  </div>
                );
              })}
            </Card>

            {results.settlements.length>0?(
              <Card style={{marginBottom:16,border:"1px solid #E8D898",background:"#FFFBF0"}}>
                <div style={{...SL,color:"#6A4810",marginBottom:4}}>🤝 Settlement Payments Required</div>
                <div style={{fontSize:12,color:"#8A7040",marginBottom:14}}>These cash payments balance everyone's Islamic share.</div>
                {results.settlements.map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",marginBottom:8,borderRadius:10,background:"#fff",border:"1px solid #E8D898"}}>
                    <span style={{fontSize:18}}>{ROLE[s.fRole].emoji}</span>
                    <div style={{flex:1,fontSize:14}}><span style={{fontWeight:700,color:ROLE[s.fRole].color}}>{s.from}</span><span style={{color:"#8A7060",margin:"0 8px"}}>pays</span><span style={{fontWeight:700,color:ROLE[s.tRole].color}}>{s.to}</span></div>
                    <span style={{fontWeight:800,fontSize:15,color:"#6A4810",background:"#FFF3D0",padding:"5px 16px",borderRadius:20,border:"1px solid #D4A840",whiteSpace:"nowrap"}}>{fmtOMR(s.amount)}</span>
                    <span style={{fontSize:18}}>{ROLE[s.tRole].emoji}</span>
                  </div>
                ))}
              </Card>
            ):(
              <Card style={{marginBottom:16,border:"1px solid #A0C8B0",background:"#EEF8F2"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,color:"#2A6840"}}>
                  <span style={{fontSize:24}}>✅</span>
                  <div><div style={{fontWeight:700}}>Perfectly Balanced</div><div style={{fontSize:13,color:"#4A8860"}}>Everyone's allocation matches their Islamic share. No settlement needed.</div></div>
                </div>
              </Card>
            )}

            <div style={{display:"flex",gap:10,justifyContent:"space-between",flexWrap:"wrap"}}>
              <Btn v="ghost" onClick={()=>setStep(3)}>← Adjust</Btn>
              <Btn v="soft" sm onClick={()=>setStep(3)}>New Scenario</Btn>
            </div>
          </div>
        )}
      </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
