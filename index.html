<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Family Inheritance — حساب الميراث</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#FAF6EF;font-family:'Segoe UI',system-ui,sans-serif;color:#2A2018}
  input,button{font-family:inherit}
  input:focus{outline:2px solid #2A6840;outline-offset:2px;border-color:#2A6840!important}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade{animation:fadeIn .3s ease}
  .spin{display:inline-block;animation:spin 1s linear infinite}

  @media print {
    body{background:#fff!important}
    .no-print{display:none!important}
    .print-only{display:block!important}
    @page{size:A4;margin:14mm}
    .pp{page-break-after:always}
    .pp:last-child{page-break-after:auto}
    .pt{font-size:17pt;font-weight:700;border-bottom:2pt solid #2A6840;padding-bottom:6pt;margin-bottom:12pt;color:#1A2018}
    .psub{font-size:9pt;color:#555;margin-top:3pt;margin-bottom:10pt}
    .ptbl{width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:10pt}
    .ptbl th{background:#eef5ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:5pt 8pt;border:0.5pt solid #bbb;font-weight:700;text-align:left}
    .ptbl td{padding:5pt 8pt;border:0.5pt solid #ddd;vertical-align:middle}
    .ptbl tr:nth-child(even) td{background:#fafafa!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .ptot td{background:#fff8ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-weight:700;border-top:1.5pt solid #B03818!important}
    .pwarn{border:1pt solid #D4A840;background:#FFF8E8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:7pt 10pt;border-radius:4pt;font-size:9pt;margin-top:8pt}
  }
  @media screen{.print-only{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ── Fixed scenario ────────────────────────────────────────
// Husband passed away. Heirs: 1 wife + 6 sons + 4 daughters.
// Wife  = 1/8  (Qur'an 4:12 — with children)
// Residue 7/8 → children: each son = 2× each daughter
// Units = (6×2) + (4×1) = 16
// Son   = (2/16) × (7/8) = 7/64
// Daughter = (1/16) × (7/8) = 7/128
const WIFE_SHARE = 1/8;
const SON_SHARE  = 7/64;
const DAU_SHARE  = 7/128;
const SONS_N = 6;
const DAUS_N = 4;

// ── Auth / GitHub ─────────────────────────────────────────
const PASSWORD_HASH = "16dea2b1c492b2f0489fc18d2a60e3ef661d4dd71e3bcf7d0f7ce707351ba6e1";
const DATA_FILE = "inheritance_data.xml";

const LS = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

const uid = ()=>Math.random().toString(36).slice(2,8);
const fmt = (n,dp=3)=>`OMR ${Number(n).toLocaleString("en",{minimumFractionDigits:dp,maximumFractionDigits:7})}`;
const pct = n=>`${(n*100).toFixed(6)}%`;
const today = ()=>new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});

// ── XML ───────────────────────────────────────────────────
const esc = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function toXML(names, estate, lands) {
  return `<?xml version="1.0" encoding="UTF-8"?>
<inheritance>
  <family wife="${esc(names.wife)}" estate="${estate}">
    <sons>${names.sons.map((n,i)=>`<son i="${i}" name="${esc(n)}"/>`).join("")}</sons>
    <daughters>${names.daughters.map((n,i)=>`<daughter i="${i}" name="${esc(n)}"/>`).join("")}</daughters>
  </family>
  <lands>${lands.map(l=>`<land id="${esc(l.id)}" name="${esc(l.name)}" value="${l.value}" loc="${esc(l.loc||"")}"/>`).join("")}</lands>
</inheritance>`;
}

function fromXML(s) {
  const doc = new DOMParser().parseFromString(s,"application/xml");
  if(doc.querySelector("parsererror")) throw new Error("Invalid XML");
  const fam = doc.querySelector("family");
  const sons = [...doc.querySelectorAll("son")].sort((a,b)=>+a.getAttribute("i")-+b.getAttribute("i")).map(n=>n.getAttribute("name")||"");
  const daus = [...doc.querySelectorAll("daughter")].sort((a,b)=>+a.getAttribute("i")-+b.getAttribute("i")).map(n=>n.getAttribute("name")||"");
  // Pad to correct count
  while(sons.length < SONS_N) sons.push("");
  while(daus.length < DAUS_N) daus.push("");
  return {
    names: { wife: fam?.getAttribute("wife")||"", sons: sons.slice(0,SONS_N), daughters: daus.slice(0,DAUS_N) },
    estate: parseFloat(fam?.getAttribute("estate"))||0,
    lands: [...doc.querySelectorAll("land")].map(n=>({id:n.getAttribute("id")||uid(),name:n.getAttribute("name")||"",value:parseFloat(n.getAttribute("value"))||0,loc:n.getAttribute("loc")||""})),
  };
}

// ── GitHub API ────────────────────────────────────────────
async function ghGet(cfg) {
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,
    {headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json"}});
  if(r.status===404) return null;
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.message||`GitHub ${r.status}`); }
  const j = await r.json();
  return { content: atob(j.content.replace(/\n/g,"")), sha: j.sha };
}
async function ghPut(cfg, xml, sha) {
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,
    {method:"PUT",headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
     body:JSON.stringify({message:sha?"Update family data":"Create family data",content:btoa(unescape(encodeURIComponent(xml))),...(sha?{sha}:{})})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.message||`GitHub ${r.status}`); }
  return (await r.json()).content.sha;
}

// ── Land division (proportional to Islamic shares) ────────
function divideLand(landVal, interestedIds, allHeirs) {
  // Each interested heir gets a portion proportional to their Islamic share
  const shareOf = id => {
    const h = allHeirs.find(x=>x.id===id);
    if(!h) return 0;
    if(h.role==="wife")      return WIFE_SHARE;
    if(h.role==="son")       return SON_SHARE;
    if(h.role==="daughter")  return DAU_SHARE;
    return 0;
  };
  const total = interestedIds.reduce((s,id)=>s+shareOf(id), 0);
  const out = {};
  interestedIds.forEach(id=>{ out[id] = total>0 ? (shareOf(id)/total)*landVal : 0; });
  return out;
}

function calcSettlements(heirs, balance) {
  const P = heirs.filter(h=>balance[h.id]>1).map(h=>({...h,amt:balance[h.id]}));
  const R = heirs.filter(h=>balance[h.id]<-1).map(h=>({...h,amt:-balance[h.id]}));
  const res=[]; let pi=0,ri=0;
  while(pi<P.length&&ri<R.length){
    const a=Math.min(P[pi].amt,R[ri].amt);
    if(a>1) res.push({from:P[pi].name,to:R[ri].name,amount:a,fromRole:P[pi].role,toRole:R[ri].role});
    P[pi].amt-=a; R[ri].amt-=a;
    if(P[pi].amt<1)pi++; if(R[ri].amt<1)ri++;
  }
  return res;
}

// ── UI primitives ─────────────────────────────────────────
function Card({children,style={}}){
  return <div style={{background:"#fff",borderRadius:12,border:"1px solid #EAE0D0",boxShadow:"0 2px 8px rgba(0,0,0,.05)",padding:22,...style}}>{children}</div>;
}
function Btn({children,onClick,v="primary",disabled=false,sm=false,full=false}){
  const base={border:"none",borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontWeight:600,transition:"all .15s",fontSize:sm?12:14,padding:sm?"6px 14px":"11px 26px",opacity:disabled?.4:1,display:"inline-flex",alignItems:"center",gap:5,width:full?"100%":"auto",justifyContent:"center"};
  const vs={primary:{background:"#2A6840",color:"#fff"},red:{background:"#B03818",color:"#fff"},ghost:{background:"transparent",color:"#2A6840",border:"1px solid #2A6840"},soft:{background:"#EEF6F0",color:"#2A6840",border:"1px solid #A0C8B0"},grey:{background:"#F0EBE3",color:"#6A5A48",border:"1px solid #DDD4C4"},blue:{background:"#1A4F7A",color:"#fff"},print:{background:"#1A4F7A",color:"#fff"}};
  return <button onClick={disabled?undefined:onClick} style={{...base,...vs[v]}}>{children}</button>;
}
function Inp({value,onChange,placeholder,type="text",style={}}){
  return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
    style={{border:"1px solid #E0D4C0",borderRadius:8,padding:"10px 14px",fontSize:14,background:"#FDFAF5",color:"#2A2018",width:"100%",...style}}/>;
}
function SyncBadge({status,err}){
  const m={loading:{bg:"#EBF2FA",c:"#2D5FA5",t:"Loading…",sp:true},saving:{bg:"#FFF8EE",c:"#8A6020",t:"Saving…",sp:true},saved:{bg:"#ECF6F0",c:"#2A6840",t:"✓ Saved"},error:{bg:"#FEE8E0",c:"#B03818",t:"⚠ "+(err||"")}}[status];
  if(!m)return null;
  return <span style={{fontSize:11,fontWeight:600,background:m.bg,color:m.c,borderRadius:20,padding:"3px 12px",display:"inline-flex",alignItems:"center",gap:4}}>{m.sp&&<span className="spin">⟳</span>}{m.t}</span>;
}

function StepBar({cur}){
  const steps=["Names","Lands","Results"];
  return(
    <div style={{display:"flex",alignItems:"flex-start",marginBottom:28,position:"relative"}}>
      <div style={{position:"absolute",top:14,left:"10%",right:"10%",height:2,background:"#E8DDD0",zIndex:0}}/>
      {steps.map((s,i)=>{
        const n=i+1,done=n<cur,active=n===cur;
        return(
          <div key={s} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
            <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,background:done?"#2A6840":active?"#B03818":"#E8DDD0",color:done||active?"#fff":"#A8907A",zIndex:1,position:"relative"}}>
              {done?"✓":n}
            </div>
            <span style={{fontSize:10,fontWeight:active?700:400,color:active?"#2A2018":"#B0907A"}}>{s}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── PRINT REPORTS ─────────────────────────────────────────
function PrintReports({names, estate, lands, ints, allHeirs, onClose}){
  const [sel,setSel]=useState(null);

  const landAllocs = useMemo(()=>{
    const out={};
    lands.forEach(l=>{
      const ids=Object.entries(ints[l.id]||{}).filter(([,v])=>v).map(([id])=>id);
      out[l.id]=ids.length>0?divideLand(l.value,ids,allHeirs):{};
    });
    return out;
  },[lands,ints,allHeirs]);

  const allocated={};allHeirs.forEach(h=>{allocated[h.id]=0;});
  lands.forEach(l=>{Object.entries(landAllocs[l.id]||{}).forEach(([id,amt])=>{allocated[id]=(allocated[id]||0)+amt;});});
  const rightful={};allHeirs.forEach(h=>{rightful[h.id]=(h.role==="wife"?WIFE_SHARE:h.role==="son"?SON_SHARE:DAU_SHARE)*estate;});
  const balance={};allHeirs.forEach(h=>{balance[h.id]=allocated[h.id]-rightful[h.id];});
  const settlements=calcSettlements(allHeirs,balance);

  const rept=[
    {id:"shares",  icon:"📊",t:"Islamic Shares",     d:"Each person's fraction, % and amount"},
    {id:"perlnd",  icon:"🗺️",t:"Per Land Report",    d:"One page per land"},
    {id:"perperson",icon:"👤",t:"Per Person Report",  d:"One page per family member"},
    {id:"matrix",  icon:"📋",t:"Master Summary",      d:"Full grid + settlements"},
  ];

  function doPrint(id){setSel(id);setTimeout(()=>window.print(),300);}

  const Header=({title,sub})=>(
    <div style={{borderBottom:"2pt solid #2A6840",paddingBottom:"7pt",marginBottom:"12pt"}}>
      <div className="pt">{title}</div>
      <div className="psub">Family Inheritance · Islamic Sharia · Oman · حساب الميراث الإسلامي · {today()}</div>
      {sub&&<div className="psub">{sub}</div>}
    </div>
  );

  return(
    <div>
      <div className="no-print">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:18}}>🖨️ Print / Save as PDF</div>
          <Btn v="grey" sm onClick={onClose}>← Back</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:16}}>
          {rept.map(r=>(
            <Card key={r.id} style={{cursor:"pointer",border:`2px solid ${sel===r.id?"#2A6840":"#EAE0D0"}`,padding:16}} onClick={()=>setSel(r.id)}>
              <div style={{fontSize:26,marginBottom:6}}>{r.icon}</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{r.t}</div>
              <div style={{fontSize:12,color:"#8A7060",marginBottom:12}}>{r.d}</div>
              <Btn v={sel===r.id?"primary":"soft"} sm onClick={e=>{e.stopPropagation();doPrint(r.id);}}>🖨️ Print / PDF</Btn>
            </Card>
          ))}
        </div>
        <div style={{padding:"10px 14px",background:"#F4F8FE",borderRadius:8,border:"1px solid #B0C8E0",fontSize:12,color:"#3A5A7A"}}>
          💡 In the print dialog, change the destination to <strong>Save as PDF</strong>
        </div>
      </div>

      {/* ── PRINT PAGES ── */}
      <div className="print-only">

        {/* SHARES */}
        {sel==="shares"&&(
          <div className="pp">
            <Header title="Islamic Shares Report" sub={`Total Estate: ${fmt(estate,0)} · Wife 1/8 · Each son 7/64 · Each daughter 7/128`}/>
            <table className="ptbl">
              <thead><tr><th>Name</th><th>Role</th><th>Fraction</th><th>Share %</th><th>Amount (OMR)</th></tr></thead>
              <tbody>
                {allHeirs.map((h,i)=>{
                  const sh=h.role==="wife"?WIFE_SHARE:h.role==="son"?SON_SHARE:DAU_SHARE;
                  const fr=h.role==="wife"?"1/8":h.role==="son"?"7/64":"7/128";
                  return <tr key={h.id}><td>{h.name}</td><td>{h.role==="wife"?"Wife":h.role==="son"?"Son":"Daughter"}</td><td style={{fontWeight:700}}>{fr}</td><td>{pct(sh)}</td><td style={{fontWeight:700}}>{fmt(sh*estate)}</td></tr>;
                })}
              </tbody>
              <tfoot><tr className="ptot"><td colSpan={4}>Total Estate</td><td>{fmt(estate,0)}</td></tr></tfoot>
            </table>
            <div className="pwarn">⚠️ Result is valid only if no other heir exists (no father, no mother, no additional wife). Islamic inheritance, Qur'an 4:11–12. Oman Personal Status Law, Royal Decree 32/97.</div>
          </div>
        )}

        {/* PER LAND */}
        {sel==="perlnd"&&lands.map(l=>{
          const a=landAllocs[l.id]||{};const ids=Object.keys(a);
          return(
            <div key={l.id} className="pp">
              <Header title={`Land: ${l.name}`} sub={`Value: ${fmt(l.value,0)}${l.loc?` · 📍 ${l.loc}`:""}`}/>
              {ids.length===0?<p style={{color:"#888",fontStyle:"italic"}}>No family members selected for this land.</p>:(
                <table className="ptbl">
                  <thead><tr><th>Name</th><th>Role</th><th>Fraction</th><th>% of Land</th><th>Amount (OMR)</th></tr></thead>
                  <tbody>{ids.map(id=>{const h=allHeirs.find(x=>x.id===id);if(!h)return null;const fr=h.role==="wife"?"1/8":h.role==="son"?"7/64":"7/128";return <tr key={id}><td>{h.name}</td><td>{h.role==="wife"?"Wife":h.role==="son"?"Son":"Daughter"}</td><td style={{fontWeight:700}}>{fr}</td><td>{(a[id]/l.value*100).toFixed(4)}%</td><td style={{fontWeight:700}}>{fmt(a[id])}</td></tr>;})}
                  </tbody>
                  <tfoot><tr className="ptot"><td colSpan={4}>Total</td><td>{fmt(ids.reduce((s,id)=>s+(a[id]||0),0))}</td></tr></tfoot>
                </table>
              )}
            </div>
          );
        })}

        {/* PER PERSON */}
        {sel==="perperson"&&allHeirs.map(h=>{
          const fr=h.role==="wife"?"1/8":h.role==="son"?"7/64":"7/128";
          const sh=h.role==="wife"?WIFE_SHARE:h.role==="son"?SON_SHARE:DAU_SHARE;
          const myLands=lands.filter(l=>(landAllocs[l.id]?.[h.id]||0)>0);
          const b=balance[h.id];
          return(
            <div key={h.id} className="pp">
              <Header title={`${h.name} — ${h.role==="wife"?"Wife":h.role==="son"?"Son":"Daughter"}`} sub={`Islamic share: ${fr} = ${pct(sh)} = ${fmt(sh*estate)}`}/>
              <table className="ptbl">
                <thead><tr><th>Land</th><th>Location</th><th>Land Value</th><th>Amount Allocated (OMR)</th></tr></thead>
                <tbody>{myLands.length===0?<tr><td colSpan={4} style={{color:"#888",fontStyle:"italic"}}>No land selected.</td></tr>:myLands.map(l=><tr key={l.id}><td>{l.name}</td><td>{l.loc||"—"}</td><td>{fmt(l.value,0)}</td><td style={{fontWeight:700}}>{fmt(landAllocs[l.id][h.id])}</td></tr>)}
                </tbody>
                <tfoot><tr className="ptot"><td colSpan={3}>Total from Lands</td><td>{fmt(allocated[h.id])}</td></tr></tfoot>
              </table>
              {Math.abs(b)>1&&<div className="pwarn">{b>0?`▲ ${h.name} received OMR ${fmt(b)} more than rightful share — settlement required.`:`▼ ${h.name} is OMR ${fmt(-b)} short of rightful share — to receive from settlement.`}</div>}
            </div>
          );
        })}

        {/* MASTER MATRIX */}
        {sel==="matrix"&&(
          <div className="pp">
            <Header title="Master Inheritance Matrix" sub={`Estate: ${fmt(estate,0)} · ${allHeirs.length} heirs · ${lands.length} lands`}/>
            <table className="ptbl">
              <thead>
                <tr>
                  <th>Name</th><th>Role</th><th>Fraction</th><th>% Share</th>
                  {lands.map(l=><th key={l.id} style={{fontSize:"8pt"}}>{l.name}</th>)}
                  <th>Total Got</th><th>Should Get</th><th>Balance</th>
                </tr>
              </thead>
              <tbody>
                {allHeirs.map(h=>{
                  const fr=h.role==="wife"?"1/8":h.role==="son"?"7/64":"7/128";
                  const sh=h.role==="wife"?WIFE_SHARE:h.role==="son"?SON_SHARE:DAU_SHARE;
                  const b=balance[h.id];
                  return(
                    <tr key={h.id}>
                      <td style={{fontWeight:600}}>{h.name}</td>
                      <td>{h.role==="wife"?"Wife":h.role==="son"?"Son":"Daughter"}</td>
                      <td style={{fontWeight:700}}>{fr}</td>
                      <td>{pct(sh)}</td>
                      {lands.map(l=><td key={l.id}>{(landAllocs[l.id]?.[h.id]||0)>0?fmt(landAllocs[l.id][h.id]):"—"}</td>)}
                      <td style={{fontWeight:700}}>{fmt(allocated[h.id])}</td>
                      <td>{fmt(rightful[h.id])}</td>
                      <td style={{color:b>50?"#B03818":b<-50?"#2A6840":"#666",fontWeight:600}}>{b>50?`▲${fmt(b)}`:b<-50?`▼${fmt(-b)}`:"✓"}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr className="ptot"><td colSpan={4}>Totals</td>{lands.map(l=><td key={l.id}>{fmt(Object.values(landAllocs[l.id]||{}).reduce((a,b)=>a+b,0))}</td>)}<td colSpan={3}>{fmt(estate,0)}</td></tr></tfoot>
            </table>
            {settlements.length>0&&<><div style={{fontWeight:700,fontSize:"10pt",margin:"12pt 0 6pt",borderBottom:"0.5pt solid #ccc",paddingBottom:"4pt"}}>🤝 Settlement Payments</div><table className="ptbl"><thead><tr><th>From</th><th>Pays To</th><th>Amount (OMR)</th></tr></thead><tbody>{settlements.map((s,i)=><tr key={i}><td>{s.from}</td><td>{s.to}</td><td style={{fontWeight:700}}>{fmt(s.amount)}</td></tr>)}</tbody></table></>}
            <div className="pwarn">Result valid only if no other heir. Qur'an 4:11–12 · Oman RD 32/97 · {today()}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [pw,setPw]=useState(""),[err,setErr]=useState(""),[show,setShow]=useState(false),[busy,setBusy]=useState(false);
  async function attempt(){
    if(!pw)return; setBusy(true);
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    if(hash===PASSWORD_HASH){onLogin();}else{setErr("Incorrect password.");setPw("");}
    setBusy(false);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#F5EDD8,#EAE0CC)",padding:20}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:10}}>🕌</div>
          <div style={{fontWeight:800,fontSize:22,color:"#2A2018"}}>Family Inheritance</div>
          <div style={{fontSize:12,color:"#8A7060",marginTop:4}}>حساب الميراث الإسلامي</div>
        </div>
        <Card style={{padding:26}}>
          <div style={{fontSize:11,fontWeight:700,color:"#8A7060",textTransform:"uppercase",letterSpacing:".08em",marginBottom:14,textAlign:"center"}}>🔒 Family Access</div>
          <div style={{position:"relative",marginBottom:12}}>
            <input value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} type={show?"text":"password"} placeholder="Password"
              onKeyDown={e=>e.key==="Enter"&&attempt()}
              style={{border:"1px solid #E0D4C0",borderRadius:8,padding:"12px 44px 12px 14px",fontSize:15,background:"#FDFAF5",color:"#2A2018",width:"100%"}}/>
            <button onClick={()=>setShow(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#A8907A"}}>{show?"🙈":"👁"}</button>
          </div>
          {err&&<div style={{padding:"8px 12px",borderRadius:8,background:"#FEE8E0",border:"1px solid #E4A090",color:"#B03818",fontSize:13,marginBottom:12}}>{err}</div>}
          <Btn v="primary" full onClick={attempt} disabled={!pw||busy}>{busy?"Checking…":"Enter →"}</Btn>
        </Card>
      </div>
    </div>
  );
}

// ── GITHUB SETTINGS ───────────────────────────────────────
function GHSettings({cfg,onSave,onBack}){
  const [token,setToken]=useState(cfg.token||"");
  const [owner,setOwner]=useState(cfg.owner||"");
  const [repo,setRepo]=useState(cfg.repo||"");
  const [msg,setMsg]=useState("");
  const [busy,setBusy]=useState(false);

  async function test(){
    setBusy(true);setMsg("");
    try{
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}`,{headers:{"Authorization":`token ${token}`}});
      if(r.ok){const j=await r.json();setMsg("✅ Connected: "+j.full_name);}
      else{const e=await r.json().catch(()=>({}));setMsg("❌ "+r.status+": "+(e.message||"error"));}
    }catch(e){setMsg("❌ Network error");}
    setBusy(false);
  }
  return(
    <div style={{maxWidth:480,margin:"40px auto",padding:"0 16px"}}>
      <Card>
        <div style={{fontSize:11,fontWeight:700,color:"#1A4F7A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:16}}>⚙️ GitHub Setup</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>Repo Owner</div><Inp value={owner} onChange={setOwner} placeholder="e.g. binarylogicllc"/></div>
          <div><div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>Repository</div><Inp value={repo} onChange={setRepo} placeholder="e.g. family"/></div>
          <div><div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>Personal Access Token (classic, repo scope)</div><Inp value={token} onChange={setToken} placeholder="ghp_…" type="password"/></div>
        </div>
        {msg&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:8,fontSize:13,lineHeight:1.6,background:msg.startsWith("✅")?"#ECF6F0":"#FEE8E0",border:`1px solid ${msg.startsWith("✅")?"#7DC49A":"#E4A090"}`,color:msg.startsWith("✅")?"#2A6840":"#B03818"}}>
          {msg}
          {msg.includes("Resource not accessible")&&<div style={{marginTop:6,fontSize:11}}>→ Go to github.com/settings/tokens → click your token → under "Organization access" → click Authorize next to your org → Save.</div>}
        </div>}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          {onBack&&<Btn v="grey" onClick={onBack}>← Back</Btn>}
          <Btn v="grey" onClick={test} disabled={!token||!owner||!repo||busy}>{busy?"Testing…":"Test"}</Btn>
          <Btn v="primary" onClick={()=>onSave({token,owner,repo})} disabled={!token||!owner||!repo}>Save →</Btn>
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════
function App(){
  const [authed, setAuthed] = useState(()=>LS.get("inh_auth",false));
  const [cfg,    setCfg]    = useState(()=>LS.get("gh_cfg",{}));
  const [showCfg,setShowCfg]= useState(false);
  const [step,   setStep]   = useState(1);

  // Core data
  const [names, setNames] = useState({
    wife: "",
    sons: Array(SONS_N).fill(""),
    daughters: Array(DAUS_N).fill(""),
  });
  // Estate = sum of all land values (no separate input needed)
  const [lands,  setLands]  = useState([]);
  const [ints,   setInts]   = useState({});

  // GitHub sync
  const [fileSha, setFileSha] = useState(null);
  const [sync,    setSync]    = useState("idle");
  const [syncErr, setSyncErr] = useState("");
  const [showPrint, setShowPrint] = useState(false);
  const saveTimer = useRef(null);

  // Land form
  const [lName,setLName]=useState("");
  const [lVal, setLVal] =useState("");
  const [lLoc, setLLoc] =useState("");
  const [editL,setEditL]=useState(null);

  const isConfigured = !!(cfg.token && cfg.owner && cfg.repo);
  const estateNum = useMemo(()=>lands.reduce((s,l)=>s+l.value,0),[lands]);

  // Build flat heirs array for calculations
  const allHeirs = useMemo(()=>{
    const h=[];
    if(names.wife) h.push({id:"wife", name:names.wife, role:"wife"});
    names.sons.forEach((n,i)=>{if(n) h.push({id:`son_${i}`, name:n, role:"son"});});
    names.daughters.forEach((n,i)=>{if(n) h.push({id:`dau_${i}`, name:n, role:"daughter"});});
    return h;
  },[names]);

  function login(){ setAuthed(true); LS.set("inh_auth",true); }
  function logout(){ setAuthed(false); LS.set("inh_auth",false); }

  // Load from GitHub on start
  useEffect(()=>{
    if(!authed||!isConfigured) return;
    setSync("loading");
    ghGet(cfg).then(r=>{
      if(r){
        try{
          const d=fromXML(r.content);
          setNames(d.names);
          setLands(d.lands);
          setFileSha(r.sha);
          if(d.names.wife||d.names.sons.some(s=>s)) setStep(d.lands.length>0?3:2);
        }catch(e){setSyncErr(e.message);}
      }
      setSync("idle");
    }).catch(e=>{setSync("error");setSyncErr(e.message);});
  },[authed,isConfigured]);

  // Auto-save
  function autoSave(n,l,sha){
    if(!isConfigured) return;
    clearTimeout(saveTimer.current);
    setSync("saving");
    saveTimer.current=setTimeout(async()=>{
      try{
        const ns=await ghPut(cfg,toXML(n,l.reduce((s,x)=>s+x.value,0),l),sha);
        setFileSha(ns);
        setSync("saved");
        setTimeout(()=>setSync("idle"),2500);
      }catch(e){setSync("error");setSyncErr(e.message);}
    },1500);
  }
  useEffect(()=>{
    if(authed&&isConfigured) autoSave(names,lands,fileSha);
  },[names,lands]);

  function toggleInt(lid,hid){
    setInts(p=>({...p,[lid]:{...(p[lid]||{}),[hid]:!(p[lid]?.[hid])}}));
  }

  const landAllocs = useMemo(()=>{
    const out={};
    lands.forEach(l=>{
      const ids=Object.entries(ints[l.id]||{}).filter(([,v])=>v).map(([id])=>id);
      out[l.id]=ids.length>0?divideLand(l.value,ids,allHeirs):{};
    });
    return out;
  },[lands,ints,allHeirs]);

  const results = useMemo(()=>{
    if(!allHeirs.length||!lands.length||!estateNum) return null;
    const allocated={};allHeirs.forEach(h=>{allocated[h.id]=0;});
    lands.forEach(l=>{Object.entries(landAllocs[l.id]||{}).forEach(([id,amt])=>{allocated[id]=(allocated[id]||0)+amt;});});
    const rightful={};
    allHeirs.forEach(h=>{rightful[h.id]=(h.role==="wife"?WIFE_SHARE:h.role==="son"?SON_SHARE:DAU_SHARE)*estateNum;});
    const balance={};allHeirs.forEach(h=>{balance[h.id]=allocated[h.id]-rightful[h.id];});
    return{allocated,rightful,balance,settlements:calcSettlements(allHeirs,balance)};
  },[allHeirs,lands,landAllocs,estateNum]);

  if(!authed) return <LoginScreen onLogin={login}/>;
  if(!isConfigured||showCfg) return <GHSettings cfg={cfg} onSave={c=>{LS.set("gh_cfg",c);setCfg(c);setShowCfg(false);}} onBack={isConfigured?()=>setShowCfg(false):null}/>;

  return(
    <div style={{background:"#FAF6EF",minHeight:"100vh",paddingBottom:60}}>

      {/* Header */}
      <div className="no-print" style={{background:"#fff",borderBottom:"1px solid #EAE0D0",padding:"13px 20px",boxShadow:"0 1px 5px rgba(0,0,0,.05)",marginBottom:22}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🕌</span>
            <div>
              <div style={{fontWeight:800,fontSize:16}}>Family Inheritance</div>
              <div style={{fontSize:10,color:"#A8907A"}}>حساب الميراث · 1 Wife · 6 Sons · 4 Daughters</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <SyncBadge status={sync} err={syncErr}/>
            {step===3&&results&&<Btn sm v="print" onClick={()=>setShowPrint(true)}>🖨️ Print</Btn>}
            <Btn sm v="grey" onClick={()=>setShowCfg(true)}>⚙️</Btn>
            <Btn sm v="ghost" onClick={logout}>🔒</Btn>
          </div>
        </div>
      </div>

      {sync==="loading"&&(
        <div className="no-print" style={{textAlign:"center",padding:"60px 20px",color:"#8A7060"}}>
          <div className="spin" style={{fontSize:34}}>⟳</div>
          <div style={{fontWeight:600,marginTop:12}}>Loading from GitHub…</div>
        </div>
      )}

      {sync!=="loading"&&(
        <div style={{maxWidth:680,margin:"0 auto",padding:"0 16px"}}>

          {showPrint&&step===3&&results?(
            <PrintReports names={names} estate={estateNum} lands={lands} ints={ints} allHeirs={allHeirs} onClose={()=>setShowPrint(false)}/>
          ):(
            <div className="no-print">
              <StepBar cur={step}/>

              {/* ══ STEP 1: NAMES ══════════════════════════════════ */}
              {step===1&&(
                <div className="fade">
                  <div style={{marginBottom:20}}>
                    <div style={{fontWeight:700,fontSize:20,marginBottom:6}}>👨‍👩‍👧‍👦 Family Members</div>
                    <div style={{fontSize:13,color:"#8A7060"}}>Enter the name of each family member.</div>
                  </div>

                  {/* Wife */}
                  <Card style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#7040A0",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>👩 Wife (Widow)</div>
                    <Inp value={names.wife} onChange={v=>setNames(p=>({...p,wife:v}))} placeholder="Wife's full name"/>
                  </Card>

                  {/* Sons */}
                  <Card style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#2A6840",textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>👦 Sons (6)</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {names.sons.map((n,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#ECF6F0",border:"1px solid #7DC49A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#2A6840",flexShrink:0}}>{i+1}</div>
                          <Inp value={n} onChange={v=>{const s=[...names.sons];s[i]=v;setNames(p=>({...p,sons:s}));}} placeholder={`Son ${i+1} name`}/>
                        </div>
                      ))}
                    </div>
                  </Card>

                  {/* Daughters */}
                  <Card style={{marginBottom:24}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#B03818",textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>👧 Daughters (4)</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {names.daughters.map((n,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#FAF0EB",border:"1px solid #DA9070",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#B03818",flexShrink:0}}>{i+1}</div>
                          <Inp value={n} onChange={v=>{const d=[...names.daughters];d[i]=v;setNames(p=>({...p,daughters:d}));}} placeholder={`Daughter ${i+1} name`}/>
                        </div>
                      ))}
                    </div>
                  </Card>

                  <div style={{display:"flex",justifyContent:"flex-end"}}>
                    <Btn onClick={()=>setStep(2)} disabled={!names.wife||names.sons.some(s=>!s)||names.daughters.some(d=>!d)}>
                      Next: Add Lands →
                    </Btn>
                  </div>
                </div>
              )}



              {/* ══ STEP 2: LANDS ═══════════════════════════════════ */}
              {step===2&&(
                <div className="fade">
                  <div style={{marginBottom:20}}>
                    <div style={{fontWeight:700,fontSize:20,marginBottom:6}}>🏡 Inherited Lands</div>
                    <div style={{fontSize:13,color:"#8A7060"}}>Add each land property and its value.</div>
                  </div>

                  <Card style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#8A7060",textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>{editL?"✏️ Edit Land":"Add a Land"}</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      <Inp value={lName} onChange={setLName} placeholder="Land name" style={{flex:"2 1 140px"}}/>
                      <Inp value={lLoc}  onChange={setLLoc}  placeholder="Location (optional)" style={{flex:"2 1 130px"}}/>
                      <Inp value={lVal}  onChange={setLVal}  placeholder="Value (OMR)" type="number" style={{flex:"1 1 110px"}}/>
                      {editL?(
                        <>
                          <Btn v="primary" onClick={()=>{const v=parseFloat(lVal);if(!lName.trim()||!v)return;setLands(p=>p.map(l=>l.id===editL?{...l,name:lName.trim(),value:v,loc:lLoc.trim()}:l));setEditL(null);setLName("");setLVal("");setLLoc("");}}>Save</Btn>
                          <Btn v="grey" sm onClick={()=>{setEditL(null);setLName("");setLVal("");setLLoc("");}}>Cancel</Btn>
                        </>
                      ):(
                        <Btn v="primary" onClick={()=>{const v=parseFloat(lVal);if(!lName.trim()||!v)return;setLands(p=>[...p,{id:uid(),name:lName.trim(),value:v,loc:lLoc.trim()}]);setLName("");setLVal("");setLLoc("");}}>+ Add</Btn>
                      )}
                    </div>
                  </Card>

                  {lands.length>0&&(
                    <Card style={{marginBottom:20}}>
                      {lands.map((l,i)=>(
                        <div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",background:i%2===0?"#FAF6EF":"#fff",borderRadius:8,border:`1px solid ${editL===l.id?"#2A6840":"#EAE0D0"}`,marginBottom:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:18}}>🗺️</span>
                            <div>
                              <div style={{fontWeight:700,fontSize:14}}>{l.name}</div>
                              <div style={{fontSize:12,color:"#8A7060"}}>{l.loc&&<span style={{marginRight:8}}>📍{l.loc}</span>}<strong style={{color:"#B03818"}}>{fmt(l.value,0)}</strong></div>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{setEditL(l.id);setLName(l.name);setLVal(String(l.value));setLLoc(l.loc||"");}} style={{background:"none",border:"1px solid #DDD4C4",borderRadius:6,cursor:"pointer",color:"#8A7060",fontSize:12,padding:"3px 8px"}}>✏️</button>
                            <button onClick={()=>setLands(p=>p.filter(x=>x.id!==l.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#D4907A",fontSize:16}}>✕</button>
                          </div>
                        </div>
                      ))}
                      <div style={{marginTop:8,padding:"12px 16px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:estateNum>0?10:0}}>
                          <span style={{fontSize:13,color:"#8A6020",fontWeight:600}}>Total Estate Value</span>
                          <span style={{fontWeight:800,color:"#6A4810",fontSize:16}}>{fmt(estateNum,0)}</span>
                        </div>
                        {estateNum>0&&(
                          <div style={{display:"flex",flexWrap:"wrap",gap:8,borderTop:"1px solid #E8D898",paddingTop:10}}>
                            {[
                              {label:`👩 ${names.wife}`, frac:"1/8", amt:WIFE_SHARE*estateNum},
                              {label:"👦 Each Son", frac:"7/64", amt:SON_SHARE*estateNum},
                              {label:"👧 Each Daughter", frac:"7/128", amt:DAU_SHARE*estateNum},
                            ].map(r=>(
                              <div key={r.label} style={{background:"#fff",border:"1px solid #E8D898",borderRadius:8,padding:"6px 12px",fontSize:12}}>
                                <span style={{fontWeight:600}}>{r.label}</span>
                                <span style={{color:"#8A6020",marginLeft:6}}>{r.frac}</span>
                                <span style={{fontWeight:700,color:"#6A4810",marginLeft:8}}>{fmt(r.amt)}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </Card>
                  )}

                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <Btn v="ghost" onClick={()=>setStep(1)}>← Names</Btn>
                    <Btn onClick={()=>setStep(3)} disabled={lands.length===0}>Next: Select Interests →</Btn>
                  </div>
                </div>
              )}

              {/* ══ STEP 3: INTERESTS + RESULTS ═════════════════════ */}
              {step===3&&(
                <div className="fade">
                  <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>📊 Interests & Results</div>
                      <div style={{fontSize:13,color:"#8A7060"}}>Tap who wants a share of each land. Results calculate automatically.</div>
                    </div>
                    {results&&<Btn v="print" sm onClick={()=>setShowPrint(true)}>🖨️ Print / PDF</Btn>}
                  </div>

                  {/* Shares summary strip */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
                    {[
                      {label:"👩 "+names.wife, sub:"Wife · 1/8", amt:WIFE_SHARE*estateNum, col:"#7040A0",bg:"#F3EEF8",bd:"#BC98E0"},
                      {label:"👦 Each Son",    sub:`7/64 · ×${names.sons.filter(Boolean).length}`, amt:SON_SHARE*estateNum, col:"#2A6840",bg:"#ECF6F0",bd:"#7DC49A"},
                      {label:"👧 Each Daughter",sub:`7/128 · ×${names.daughters.filter(Boolean).length}`, amt:DAU_SHARE*estateNum, col:"#B03818",bg:"#FAF0EB",bd:"#DA9070"},
                    ].map(r=>(
                      <div key={r.label} style={{background:r.bg,border:`1px solid ${r.bd}`,borderRadius:10,padding:"12px 14px"}}>
                        <div style={{fontSize:12,fontWeight:700,color:r.col,marginBottom:3}}>{r.label}</div>
                        <div style={{fontSize:10,color:r.col,opacity:.7,marginBottom:6}}>{r.sub}</div>
                        <div style={{fontWeight:800,fontSize:13,color:"#2A2018"}}>{fmt(r.amt)}</div>
                      </div>
                    ))}
                  </div>

                  {/* Land interest cards */}
                  {lands.map(land=>{
                    const intIds=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);
                    const prev=intIds.length>0?divideLand(land.value,intIds,allHeirs):null;
                    return(
                      <Card key={land.id} style={{marginBottom:14}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:16}}>🗺️ {land.name}</div>
                            <div style={{fontSize:12,color:"#8A7060",marginTop:2}}>{land.loc&&<span style={{marginRight:8}}>📍{land.loc}</span>}<strong style={{color:"#B03818"}}>{fmt(land.value,0)}</strong></div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:10,color:"#A8907A"}}>Selected</div>
                            <div style={{fontWeight:800,fontSize:22,color:intIds.length>0?"#2A6840":"#C0907A"}}>{intIds.length}</div>
                          </div>
                        </div>

                        {/* Wife */}
                        {names.wife&&(()=>{const h=allHeirs.find(x=>x.role==="wife");if(!h)return null;const on=!!(ints[land.id]?.[h.id]);return(
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#7040A0",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Wife</div>
                            <button onClick={()=>toggleInt(land.id,h.id)} style={{border:`2px solid ${on?"#7040A0":"#BC98E0"}`,background:on?"#F3EEF8":"#fff",borderRadius:10,padding:"8px 16px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,transition:"all .15s",boxShadow:on?"0 2px 8px rgba(112,64,160,.2)":"none"}}>
                              <span style={{fontSize:16}}>👩</span>
                              <div style={{textAlign:"left"}}>
                                <div style={{fontSize:13,fontWeight:700,color:on?"#7040A0":"#6A5A4A"}}>{h.name}</div>
                                <div style={{fontSize:10,color:on?"#7040A0":"#A8907A"}}>{on?"✓ Selected":"Tap to select"}</div>
                              </div>
                            </button>
                          </div>
                        );})()}

                        {/* Sons */}
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#2A6840",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Sons</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                            {allHeirs.filter(h=>h.role==="son").map(h=>{const on=!!(ints[land.id]?.[h.id]);return(
                              <button key={h.id} onClick={()=>toggleInt(land.id,h.id)} style={{border:`2px solid ${on?"#2A6840":"#7DC49A"}`,background:on?"#ECF6F0":"#fff",borderRadius:10,padding:"7px 14px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7,transition:"all .15s",boxShadow:on?"0 2px 8px rgba(42,104,64,.2)":"none",transform:on?"scale(1.03)":"scale(1)"}}>
                                <span style={{fontSize:14}}>👦</span>
                                <div style={{textAlign:"left"}}>
                                  <div style={{fontSize:12,fontWeight:700,color:on?"#2A6840":"#6A5A4A"}}>{h.name}</div>
                                  <div style={{fontSize:10,color:on?"#2A6840":"#A8907A"}}>{on?"✓":"Tap"}</div>
                                </div>
                              </button>
                            );})}
                          </div>
                        </div>

                        {/* Daughters */}
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:"#B03818",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Daughters</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                            {allHeirs.filter(h=>h.role==="daughter").map(h=>{const on=!!(ints[land.id]?.[h.id]);return(
                              <button key={h.id} onClick={()=>toggleInt(land.id,h.id)} style={{border:`2px solid ${on?"#B03818":"#DA9070"}`,background:on?"#FAF0EB":"#fff",borderRadius:10,padding:"7px 14px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7,transition:"all .15s",boxShadow:on?"0 2px 8px rgba(176,56,24,.2)":"none",transform:on?"scale(1.03)":"scale(1)"}}>
                                <span style={{fontSize:14}}>👧</span>
                                <div style={{textAlign:"left"}}>
                                  <div style={{fontSize:12,fontWeight:700,color:on?"#B03818":"#6A5A4A"}}>{h.name}</div>
                                  <div style={{fontSize:10,color:on?"#B03818":"#A8907A"}}>{on?"✓":"Tap"}</div>
                                </div>
                              </button>
                            );})}
                          </div>
                        </div>

                        {/* Live preview */}
                        {prev&&(
                          <div style={{marginTop:14,padding:"10px 14px",background:"#F7F4EE",borderRadius:8,border:"1px solid #E8DDD0"}}>
                            <div style={{fontSize:11,fontWeight:700,color:"#8A7060",marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>Split preview</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                              {intIds.map(id=>{
                                const h=allHeirs.find(x=>x.id===id);
                                const col=h.role==="wife"?"#7040A0":h.role==="son"?"#2A6840":"#B03818";
                                const bg=h.role==="wife"?"#F3EEF8":h.role==="son"?"#ECF6F0":"#FAF0EB";
                                const bd=h.role==="wife"?"#BC98E0":h.role==="son"?"#7DC49A":"#DA9070";
                                return <div key={id} style={{fontSize:12,padding:"4px 12px",borderRadius:6,background:bg,color:col,border:`1px solid ${bd}`,fontWeight:600}}>{h.name}: {fmt(prev[id])}</div>;
                              })}
                            </div>
                          </div>
                        )}
                      </Card>
                    );
                  })}

                  {/* Results table */}
                  {results&&(
                    <>
                      <Card style={{marginBottom:14,border:"1px solid #D4E8C4",background:"#F8FBF6"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#2A6840",textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>💰 Final Allocation vs Rightful Share</div>
                        <div style={{overflowX:"auto"}}>
                          <table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}>
                            <thead>
                              <tr style={{background:"#EEF8E8"}}>
                                {["Name","Role","Fraction","Rightful","Allocated","Balance"].map(h=>(
                                  <th key={h} style={{padding:"8px 10px",textAlign:h==="Name"?"left":"right",fontWeight:700,color:"#2A6840",fontSize:11,textTransform:"uppercase",letterSpacing:".04em",whiteSpace:"nowrap",borderBottom:"2px solid #A0C890"}}>{h}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {allHeirs.map((h,i)=>{
                                const b=results.balance[h.id];
                                const pos=b>50,neg=b<-50;
                                const fr=h.role==="wife"?"1/8":h.role==="son"?"7/64":"7/128";
                                const rc=h.role==="wife"?"#7040A0":h.role==="son"?"#2A6840":"#B03818";
                                return(
                                  <tr key={h.id} style={{background:i%2===0?"#F8FBF6":"#fff",borderBottom:"1px solid #E0ECD8"}}>
                                    <td style={{padding:"9px 10px",fontWeight:700}}>{h.name}</td>
                                    <td style={{padding:"9px 10px",textAlign:"right",fontSize:11,color:rc,fontWeight:600}}>{h.role==="wife"?"Wife":h.role==="son"?"Son":"Daughter"}</td>
                                    <td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"#1A4F2A",fontSize:14}}>{fr}</td>
                                    <td style={{padding:"9px 10px",textAlign:"right",whiteSpace:"nowrap"}}>{fmt(results.rightful[h.id])}</td>
                                    <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(results.allocated[h.id])}</td>
                                    <td style={{padding:"9px 10px",textAlign:"right"}}>
                                      <span style={{padding:"3px 8px",borderRadius:20,fontWeight:700,fontSize:11,whiteSpace:"nowrap",background:pos?"#FEE8E0":neg?"#E8F5EE":"#F0EDE6",color:pos?"#B03818":neg?"#2A6840":"#8A7060"}}>
                                        {pos?`▲ Owes ${fmt(b)}`:neg?`▼ Gets ${fmt(-b)}`:"✓ Even"}
                                      </span>
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                            <tfoot>
                              <tr style={{background:"#FFF8EE",borderTop:"2px solid #C8A840"}}>
                                <td colSpan={3} style={{padding:"9px 10px",fontWeight:700,color:"#6A4810"}}>Total Estate</td>
                                <td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmt(estateNum,0)}</td>
                                <td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmt(Object.values(results.allocated).reduce((a,b)=>a+b,0),0)}</td>
                                <td/>
                              </tr>
                            </tfoot>
                          </table>
                        </div>
                      </Card>

                      {results.settlements.length>0?(
                        <Card style={{marginBottom:14,border:"1px solid #E8D898",background:"#FFFBF0"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#6A4810",textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>🤝 Settlement Payments Required</div>
                          {results.settlements.map((s,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",marginBottom:8,borderRadius:10,background:"#fff",border:"1px solid #E8D898"}}>
                              <span style={{fontSize:18}}>{s.fromRole==="wife"?"👩":s.fromRole==="son"?"👦":"👧"}</span>
                              <div style={{flex:1,fontSize:14}}>
                                <span style={{fontWeight:700}}>{s.from}</span>
                                <span style={{color:"#8A7060",margin:"0 8px"}}>pays</span>
                                <span style={{fontWeight:700}}>{s.to}</span>
                              </div>
                              <span style={{fontWeight:800,fontSize:15,color:"#6A4810",background:"#FFF3D0",padding:"4px 14px",borderRadius:20,border:"1px solid #D4A840",whiteSpace:"nowrap"}}>{fmt(s.amount)}</span>
                              <span style={{fontSize:18}}>{s.toRole==="wife"?"👩":s.toRole==="son"?"👦":"👧"}</span>
                            </div>
                          ))}
                        </Card>
                      ):(
                        <Card style={{marginBottom:14,border:"1px solid #A0C8B0",background:"#EEF8F2"}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,color:"#2A6840"}}>
                            <span style={{fontSize:22}}>✅</span>
                            <div><div style={{fontWeight:700}}>Balanced</div><div style={{fontSize:12,color:"#4A8860"}}>Allocations match Islamic shares. No settlement needed.</div></div>
                          </div>
                        </Card>
                      )}
                    </>
                  )}

                  <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                    <Btn v="ghost" onClick={()=>setStep(2)}>← Lands</Btn>
                    <div style={{display:"flex",gap:8}}>
                      {results&&<Btn v="print" sm onClick={()=>setShowPrint(true)}>🖨️ Print / PDF</Btn>}
                      <Btn v="soft" sm onClick={()=>setStep(1)}>✏️ Edit Names</Btn>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
