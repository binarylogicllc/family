// ── GCD / fraction utilities ──────────────────────────────
function gcd(a,b){return b<0.0001?a:gcd(b,a%b);}
function toFrac(x){
  if(x===0)return "0";
  const tolerance=1e-9;
  let h1=1,h2=0,k1=0,k2=1,b=x;
  let iter=0;
  do{
    const a=Math.floor(b);
    let aux=h1;h1=a*h1+h2;h2=aux;
    aux=k1;k1=a*k1+k2;k2=aux;
    b=1/(b-a);
    iter++;
  }while(Math.abs(x-h1/k1)>x*tolerance&&iter<20);
  return `${h1}/${k1}`;
}

// ── All heir types for confirmation checklist ─────────────
// Confirmation checklist per approved spec — these heirs CHANGE all shares
const CONFIRM_LIST = [
  // ── Critical — directly change wife's/children's shares ──────────────────────
  {key:"father",       critical:true,  q:"Is the deceased's father alive?",
   note:"Father's presence changes mother's share from 1/3 to 1/6 and also takes 1/6 himself."},

// ══════════════════════════════════════════════════════════
// ISLAMIC SHARES ENGINE — per Qur'an 4:11-12, 4:176
// Jurisdiction: Oman — Royal Decree 32/97
// ══════════════════════════════════════════════════════════
function islamicSharesEngine(heirs){
  const H = role => heirs.find(h=>h.role===role);
  const HS= role => heirs.filter(h=>h.role===role);

  const husband      = H("husband"),   wives        = HS("wife"),
        father       = H("father"),    mother       = H("mother"),
        sons         = HS("son"),      daughters    = HS("daughter"),
        grandsons    = HS("grandson"), granddaughters=HS("granddaughter"),
        pgrandfather = H("pgrandfather"),
        mgrandmother = H("mgrandmother"), pgrandmother = H("pgrandmother"),
        fullBrothers = HS("fullbrother"), fullSisters  = HS("fullsister"),
        consBrothers = HS("consbrother"), consSisters  = HS("conssister"),
        uterineSibs  = HS("uterinesib");

  const hasDirectSon = sons.length>0;
  const hasDirectDaughter = daughters.length>0;
  const hasGrandson = grandsons.length>0;
  const hasChild = sons.length>0||daughters.length>0;
  const hasGrandchild = grandsons.length>0||granddaughters.length>0;
  const hasCOG = hasChild||hasGrandchild;     // child or grandchild
  const siblingsCount = fullBrothers.length+fullSisters.length+consBrothers.length+consSisters.length+uterineSibs.length;

  const shares = {}, basis = {}, fracs = {}, warnings = [];
  let pool = 1;

  function assign(id, share, frac, b){
    shares[id]=(shares[id]||0)+share;
    fracs[id]=frac;
    basis[id]=b;
  }

  // ── 1. HUSBAND ───────────────────────────────────────────
  if(husband){
    const s=hasCOG?1/4:1/2;
    assign(husband.id,s,hasCOG?"1/4":"1/2",hasCOG?"Qur'an 4:12 — 1/4 (child exists)":"Qur'an 4:12 — 1/2 (no child)");
    pool-=s;
  }

  // ── 2. WIFE / WIVES ──────────────────────────────────────
  if(wives.length>0){
    const totalW=hasCOG?1/8:1/4;
    const each=totalW/wives.length;
    wives.forEach(w=>{assign(w.id,each,`${hasCOG?"1/8":"1/4"}÷${wives.length}`,`Qur'an 4:12 — wife gets ${hasCOG?"1/8":"1/4"}${wives.length>1?` shared by ${wives.length} wives`:""}`)});
    pool-=totalW;
    if(wives.length>1) warnings.push("Multiple wives share the wife's fixed portion equally.");
  }

  // ── 3. FATHER ────────────────────────────────────────────
  if(father){
    if(hasCOG){
      assign(father.id,1/6,"1/6","Qur'an 4:11 — 1/6 (child exists); also takes residue if no sons");
      pool-=1/6;
      // Father also gets residue if no sons/grandsons — handled in Asaba block
    }
    // if no children, father takes all residue — handled in Asaba block
  }

  // ── 4. MOTHER ────────────────────────────────────────────
  if(mother){
    // 1/6 if: children exist, OR grandchildren, OR 2+ siblings of deceased
    if(hasCOG||siblingsCount>=2){
      assign(mother.id,1/6,"1/6","Qur'an 4:11 — 1/6 (child or grandchild exists, or 2+ siblings)");
      pool-=1/6;
    } else {
      assign(mother.id,1/3,"1/3","Qur'an 4:11 — 1/3 (no child, fewer than 2 siblings)");
      pool-=1/3;
    }
  }

  // ── 5. PATERNAL GRANDFATHER (no father) ─────────────────
  if(!father&&pgrandfather){
    if(hasCOG){
      assign(pgrandfather.id,1/6,"1/6","Like father — 1/6 (child exists); Consensus of scholars");
      pool-=1/6;
    }
    // Complex: grandfather + siblings requires Muqasama — flag as advisory
    if(siblingsCount>0) warnings.push("⚠️ Grandfather with siblings: share requires detailed Muqasama calculation (consult a scholar).");
  }

  // ── 6. GRANDMOTHERS ─────────────────────────────────────
  if(!mother){
    const gm=[];
    if(mgrandmother)gm.push(mgrandmother);
    if(pgrandmother)gm.push(pgrandmother);
    if(gm.length>0){
      const each=(1/6)/gm.length;
      gm.forEach(g=>{assign(g.id,each,gm.length>1?"1/12 each":"1/6","1/6 shared by grandmothers — Hadith of Prophet ﷺ (Abu Dawud)");});
      pool-=1/6;
    }
  }

  // ── 7. DAUGHTERS — fixed share if NO sons & NO grandsons ─
  if(daughters.length>0 && !hasDirectSon && !hasGrandson){
    const total=daughters.length===1?1/2:2/3;
    const each=total/daughters.length;
    daughters.forEach(d=>{assign(d.id,each,daughters.length===1?"1/2":`2/3÷${daughters.length}`,daughters.length===1?"Qur'an 4:11 — 1/2 (one daughter, no son)":"Qur'an 4:11 — 2/3 shared (daughters, no son)");});
    pool-=total;
  }

  // ── 8. GRANDDAUGHTERS — fixed share if no sons, daughters, or grandsons ──
  if(granddaughters.length>0&&!hasDirectSon&&!hasDirectDaughter&&!hasGrandson){
    const total=granddaughters.length===1?1/2:2/3;
    const each=total/granddaughters.length;
    granddaughters.forEach(d=>{assign(d.id,each,granddaughters.length===1?"1/2":"2/3/n","Like daughters — Qur'an 4:11 by extension");});
    pool-=total;
  } else if(granddaughters.length>0&&daughters.length===1&&!hasDirectSon&&!hasGrandson){
    // One daughter gets 1/2, granddaughters share 1/6
    const each=(1/6)/granddaughters.length;
    granddaughters.forEach(d=>{assign(d.id,each,`1/6÷${granddaughters.length}`,"1/6 to complete 2/3 — Hadith, Bukhari");});
    pool-=1/6;
  }

  // ── 9. FULL SISTERS — fixed if no sons, no father, no pgrandfather, no children ──
  if(fullSisters.length>0&&fullBrothers.length===0&&!father&&!hasCOG&&!pgrandfather){
    const total=fullSisters.length===1?1/2:2/3;
    const each=total/fullSisters.length;
    fullSisters.forEach(s=>{assign(s.id,each,fullSisters.length===1?"1/2":"2/3/n","Qur'an 4:176 — full sister(s)");});
    pool-=total;
  }

  // ── 10. CONSANGUINE SISTERS — fixed (if no full brothers/sisters) ─
  if(consSisters.length>0&&consBrothers.length===0&&fullBrothers.length===0&&fullSisters.length===0&&!father&&!hasCOG&&!pgrandfather){
    const total=consSisters.length===1?1/2:2/3;
    const each=total/consSisters.length;
    consSisters.forEach(s=>{assign(s.id,each,consSisters.length===1?"1/2":"2/3/n","Qur'an 4:176 — consanguine sister, like full sister");});
    pool-=total;
  }

  // ── 11. UTERINE SIBLINGS ─────────────────────────────────
  if(uterineSibs.length>0&&!hasCOG&&!father&&!pgrandfather){
    const total=uterineSibs.length===1?1/6:1/3;
    const each=total/uterineSibs.length;
    uterineSibs.forEach(s=>{assign(s.id,each,uterineSibs.length===1?"1/6":`1/3÷${uterineSibs.length}`,"Qur'an 4:12 — uterine siblings");});
    pool-=total;
  }

  // ══ ASABA (RESIDUE) DISTRIBUTION ═══════════════════════
  if(pool>0.0001){
    // Priority 1: Sons (+ daughters as Asaba with sons)
    if(sons.length>0){
      const asDaus=daughters.filter(d=>!shares[d.id]);  // daughters not yet assigned
      const units=sons.length*2+asDaus.length;
      sons.forEach(s=>{assign(s.id,(2/units)*pool,`2/${units}×residue`,"Qur'an 4:11 — عصبة: son 2× daughter");});
      asDaus.forEach(d=>{assign(d.id,(1/units)*pool,`1/${units}×residue`,"Qur'an 4:11 — عصبة with brother");});
      pool=0;
    }
    // Priority 2: Grandsons (+ granddaughters)
    else if(grandsons.length>0){
      const asGDaus=granddaughters.filter(d=>!shares[d.id]);
      const units=grandsons.length*2+asGDaus.length;
      grandsons.forEach(s=>{assign(s.id,(2/units)*pool,`2/${units}×res`,"عصبة — grandson like son");});
      asGDaus.forEach(d=>{assign(d.id,(1/units)*pool,`1/${units}×res`,"عصبة — granddaughter with grandson");});
      pool=0;
    }
    // Priority 3: Father (takes remaining after his 1/6, or all if no child)
    else if(father){
      shares[father.id]=(shares[father.id]||0)+pool;
      fracs[father.id]=hasCOG?`1/6+residue`:"All residue";
      basis[father.id]+=" + residue (عصبة — no sons)";
      pool=0;
    }
    // Priority 4: Paternal grandfather (no father)
    else if(!father&&pgrandfather){
      shares[pgrandfather.id]=(shares[pgrandfather.id]||0)+pool;
      fracs[pgrandfather.id]=hasCOG?`1/6+residue`:"All residue";
      basis[pgrandfather.id]+=" + residue";
      pool=0;
    }
    // Priority 5: Full brothers (+ full sisters with them)
    else if(fullBrothers.length>0&&!hasCOG){
      const sists=fullSisters.filter(s=>!shares[s.id]);
      const units=fullBrothers.length*2+sists.length;
      fullBrothers.forEach(b=>{assign(b.id,(2/units)*pool,`2/${units}×res`,"عصبة — full brother");});
      sists.forEach(s=>{assign(s.id,(1/units)*pool,`1/${units}×res`,"عصبة — full sister with brother");});
      pool=0;
    }
    // Priority 6: Full sisters as Asaba with daughters (Ta'seeb)
    else if(fullSisters.length>0&&daughters.length>0&&!hasCOG&&!father){
      const each=pool/fullSisters.length;
      fullSisters.forEach(s=>{
        const prev=shares[s.id]||0;
        shares[s.id]=prev+each;
        fracs[s.id]=(shares[s.id]||0)>0?toFrac(shares[s.id]):"0";
        basis[s.id]=(basis[s.id]||"")+" + Asaba with daughters (Ta'seeb)";
      });
      pool=0;
    }
    // Priority 7: Consanguine brothers (no full brothers)
    else if(consBrothers.length>0&&!hasCOG){
      const sists=consSisters.filter(s=>!shares[s.id]);
      const units=consBrothers.length*2+sists.length;
      consBrothers.forEach(b=>{assign(b.id,(2/units)*pool,`2/${units}×res`,"عصبة — consanguine brother");});
      sists.forEach(s=>{assign(s.id,(1/units)*pool,`1/${units}×res`,"عصبة — consanguine sister with brother");});
      pool=0;
    }
    else if(pool>0.01){
      warnings.push(`⚠️ Residue of ${fmtPct2(pool)} remains unallocated. This may require Radd (رد) redistribution or Bayt al-Mal. Consult a scholar.`);
    }
  }

  // ── Radd: if no Asaba heirs, return residue to fixed-share heirs (excluding spouse) ──
  if(pool>0.01){
    const raddHeirs=heirs.filter(h=>shares[h.id]&&h.role!=="husband"&&h.role!=="wife");
    if(raddHeirs.length>0){
      const totalFixed=raddHeirs.reduce((s,h)=>s+(shares[h.id]||0),0);
      raddHeirs.forEach(h=>{
        const extra=(shares[h.id]/totalFixed)*pool;
        shares[h.id]+=extra;
        fracs[h.id]=toFrac(shares[h.id]);
        basis[h.id]+=" + Radd (رد)";
      });
      pool=0;
    }
  }

  // Compute precise fractions
  heirs.forEach(h=>{
    if(shares[h.id]){fracs[h.id]=toFrac(shares[h.id]);}
  });

  return{shares,fracs,basis,warnings,pool};
}

// ── Land division ─────────────────────────────────────────
function divideLand(val,ids,shares){
  let tw=0;const ws={};
  ids.forEach(id=>{ws[id]=shares[id]||0;tw+=ws[id];});
  const out={};ids.forEach(id=>{out[id]=tw>0?(ws[id]/tw)*val:0;});
  return out;
}
function settle(heirs,balance){
  const P=heirs.filter(h=>balance[h.id]>1).map(h=>({...h,amt:balance[h.id]}));
  const R=heirs.filter(h=>balance[h.id]<-1).map(h=>({...h,amt:-balance[h.id]}));
  const res=[];let pi=0,ri=0;
  while(pi<P.length&&ri<R.length){
    const a=Math.min(P[pi].amt,R[ri].amt);
    if(a>1)res.push({from:P[pi].name,fRole:P[pi].role,to:R[ri].name,tRole:R[ri].role,amount:a});
    P[pi].amt-=a;R[ri].amt-=a;
    if(P[pi].amt<1)pi++;if(R[ri].amt<1)ri++;
  }
  return res;
}

// ── XML ───────────────────────────────────────────────────
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function toXML(estate,heirs,lands){
  return `<?xml version="1.0" encoding="UTF-8"?>\n<inheritance>\n  <estate gross="${estate.gross}" debts="${estate.debts}" bequest="${estate.bequest}" bequestIsHeir="${estate.bequestIsHeir}" deceasedName="${esc(estate.deceasedName)}" religion="${esc(estate.religion)}"/>\n  <heirs>\n${heirs.map(h=>`    <heir id="${esc(h.id)}" name="${esc(h.name)}" role="${esc(h.role)}"/>`).join("\n")}\n  </heirs>\n  <lands>\n${lands.map(l=>`    <land id="${esc(l.id)}" name="${esc(l.name)}" value="${l.value}" location="${esc(l.loc||"")}"/>`).join("\n")}\n  </lands>\n</inheritance>`;
}
function fromXML(s){
  const doc=new DOMParser().parseFromString(s,"application/xml");
  if(doc.querySelector("parsererror"))throw new Error("Invalid XML");
  const en=doc.querySelector("estate");
  const estate=en?{gross:parseFloat(en.getAttribute("gross"))||0,debts:parseFloat(en.getAttribute("debts"))||0,bequest:parseFloat(en.getAttribute("bequest"))||0,bequestIsHeir:en.getAttribute("bequestIsHeir")==="true",deceasedName:en.getAttribute("deceasedName")||"",religion:en.getAttribute("religion")||"Muslim"}:{gross:0,debts:0,bequest:0,bequestIsHeir:false,deceasedName:"",religion:"Muslim"};
  return{
    estate,
    heirs:[...doc.querySelectorAll("heir")].map(n=>({id:n.getAttribute("id")||uid(),name:n.getAttribute("name")||"",role:n.getAttribute("role")||"son"})),
    lands:[...doc.querySelectorAll("land")].map(n=>({id:n.getAttribute("id")||uid(),name:n.getAttribute("name")||"",value:parseFloat(n.getAttribute("value"))||0,loc:n.getAttribute("location")||""})),
  };
}

// ── GitHub API ────────────────────────────────────────────
async function ghGet(cfg){
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,{headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json"}});
  if(r.status===404)return null;
  if(!r.ok)throw new Error(`GitHub ${r.status}`);
  const j=await r.json();
  return{content:atob(j.content.replace(/\n/g,"")),sha:j.sha};
}
async function ghPut(cfg,xml,sha){
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_FILE}`,{method:"PUT",headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({message:sha?"Update":"Create",content:btoa(unescape(encodeURIComponent(xml))),...(sha?{sha}:{})})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`GitHub ${r.status}`);}
  return(await r.json()).content.sha;
}

      const ids=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);

function LoginScreen({onLogin}){
  const [pw,setPw]=useState("");const [err,setErr]=useState("");const [show,setShow]=useState(false);const [busy,setBusy]=useState(false);
  async function attempt(){
    if(!pw)return;setBusy(true);
    const enc=new TextEncoder();
    const buf=await crypto.subtle.digest("SHA-256",enc.encode(pw));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    if(hash===PASSWORD_HASH){onLogin();}else{setErr("Incorrect password.");setPw("");}
    setBusy(false);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#F5EDD8,#EAE0CC)",padding:20}}>
      <div className="fade" style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:10}}>🕌</div>
          <div style={{fontWeight:800,fontSize:22,color:"#2A2018",marginBottom:4}}>Islamic Inheritance Divider</div>
          <div style={{fontSize:12,color:"#8A7060"}}>Oman · Royal Decree 32/97 · حساب الميراث</div>
        </div>
        <Card style={{padding:26}}>
          <div style={{...SL,textAlign:"center",marginBottom:14}}>🔒 Family Access</div>
          <div style={{position:"relative",marginBottom:12}}>
            <input value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} type={show?"text":"password"} placeholder="Family password" onKeyDown={e=>e.key==="Enter"&&attempt()}
              style={{border:"1px solid #E0D4C0",borderRadius:8,padding:"11px 44px 11px 14px",fontSize:15,background:"#FDFAF5",color:"#2A2018",width:"100%"}}/>
            <button onClick={()=>setShow(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#A8907A"}}>{show?"🙈":"👁"}</button>
          </div>
          {err&&<div className="pop" style={{padding:"8px 12px",borderRadius:8,background:"#FEE8E0",border:"1px solid #E4A090",color:"#B03818",fontSize:13,marginBottom:12}}>{err}</div>}
          <Btn v="primary" full onClick={attempt} disabled={!pw||busy}>{busy?"Checking…":"Enter →"}</Btn>
        </Card>
      </div>
    </div>
  );
}

        </div>
        {msg&&<div className="pop" style={{marginTop:12,padding:"8px 14px",borderRadius:8,fontSize:13,background:msg.startsWith("✅")?"#ECF6F0":"#FEE8E0",border:`1px solid ${msg.startsWith("✅")?"#7DC49A":"#E4A090"}`,color:msg.startsWith("✅")?"#2A6840":"#B03818"}}>{msg}</div>}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          {onBack&&<Btn v="grey" onClick={onBack}>← Back</Btn>}
          <Btn v="grey" onClick={test} disabled={!token||!owner||!repo||busy}>{busy?"…":"Test"}</Btn>
          <Btn v="blue" onClick={()=>onSave({token,owner,repo})} disabled={!token||!owner||!repo}>Save →</Btn>
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════
function App(){
  const [authed, setAuthed] = useState(()=>LS.get("inh_auth",false));
  const [cfg,    setCfg]    = useState(()=>LS.get("gh_cfg",{}));
  const [step,   setStep]   = useState(1);
  const [estate, setEstate] = useState({gross:0,debts:0,bequest:0,bequestIsHeir:false,deceasedName:"",religion:"Muslim"});
  const [heirs,  setHeirs]  = useState([]);
  const [confirmed, setConfirmed] = useState({}); // {roleKey: true/false/null}
  const [lands,  setLands]  = useState([]);
  const [ints,   setInts]   = useState({});
  const [fileSha,setFileSha]= useState(null);
  const [sync,   setSync]   = useState("idle");
  const [syncErr,setSyncErr]= useState("");
  const [showPrint,setShowPrint]=useState(false);
  const [showCfg,setShowCfg]=useState(false);
  const saveTimer=useRef(null);

  const [hName,setHName]=useState("");const [hRole,setHRole]=useState("son");const [editH,setEditH]=useState(null);
  const [lName,setLName]=useState("");const [lVal,setLVal]=useState("");const [lLoc,setLLoc]=useState("");const [editL,setEditL]=useState(null);

  const isConfigured=!!(cfg.token&&cfg.owner&&cfg.repo);
  const netEstate=useMemo(()=>Math.max(0,estate.gross-estate.debts-(estate.bequestIsHeir?0:estate.bequest)),[estate]);

  function login(){setAuthed(true);LS.set("inh_auth",true);}
  function logout(){setAuthed(false);LS.set("inh_auth",false);}

  useEffect(()=>{
    if(!authed||!isConfigured)return;
    setSync("loading");
    ghGet(cfg).then(r=>{
      if(r){try{const{estate:e,heirs:h,lands:l}=fromXML(r.content);setEstate(e);setHeirs(h);setLands(l);setFileSha(r.sha);if(h.length>0&&l.length>0)setStep(4);}catch(e){setSyncErr(e.message);setSync("error");return;}}
      setSync("idle");
    }).catch(e=>{setSync("error");setSyncErr(e.message);});
  },[authed,isConfigured]);

  function autoSave(est,h,l,sha){
    if(!isConfigured)return;
    clearTimeout(saveTimer.current);
    setSync("saving");
    saveTimer.current=setTimeout(async()=>{
      try{const ns=await ghPut(cfg,toXML(est,h,l),sha);setFileSha(ns);setSync("saved");setTimeout(()=>setSync("idle"),2500);}
      catch(e){setSync("error");setSyncErr(e.message);}
    },1500);
  }
  useEffect(()=>{if(authed&&isConfigured&&(heirs.length||lands.length))autoSave(estate,heirs,lands,fileSha);},[estate,heirs,lands]);

  const engine = useMemo(()=>islamicSharesEngine(heirs),[heirs]);

  // Completeness check
  const allConfirmed = useMemo(()=>CONFIRM_LIST.every(c=>confirmed[c.key]===true||confirmed[c.key]===false),[confirmed]);
  const isProvisional = !allConfirmed;

  function addHeir(){
    if(!hName.trim())return;
    const r=ROLE[hRole];
    if(r.unique&&heirs.find(h=>h.role===hRole))return;
    setHeirs(p=>[...p,{id:uid(),name:hName.trim(),role:hRole}]);
    setHName("");
  }
  function saveH(id){setHeirs(p=>p.map(h=>h.id===id?{...h,name:hName.trim(),role:hRole}:h));setEditH(null);setHName("");setHRole("son");}
  function startH(h){setEditH(h.id);setHName(h.name);setHRole(h.role);}
  function addLand(){const v=parseFloat(lVal);if(!lName.trim()||isNaN(v)||v<=0)return;setLands(p=>[...p,{id:uid(),name:lName.trim(),value:v,loc:lLoc.trim()}]);setLName("");setLVal("");setLLoc("");}
  function saveL(id){const v=parseFloat(lVal);if(!lName.trim()||isNaN(v)||v<=0)return;setLands(p=>p.map(l=>l.id===id?{...l,name:lName.trim(),value:v,loc:lLoc.trim()}:l));setEditL(null);setLName("");setLVal("");setLLoc("");}
  function startL(l){setEditL(l.id);setLName(l.name);setLVal(String(l.value));setLLoc(l.loc||"");}
  function toggleInt(lid,hid){setInts(p=>({...p,[lid]:{...(p[lid]||{}),[hid]:!(p[lid]?.[hid])}}));}

  const landAllocs=useMemo(()=>{
    const out={};
    lands.forEach(land=>{
      const ids=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);
      out[land.id]=ids.length>0?divideLand(land.value,ids,engine.shares):{};
    });
    return out;
  },[lands,ints,engine]);

  const results=useMemo(()=>{
    if(!heirs.length||!lands.length)return null;
    const alloc={};heirs.forEach(h=>{alloc[h.id]=0;});
    lands.forEach(land=>{Object.entries(landAllocs[land.id]||{}).forEach(([id,amt])=>{alloc[id]=(alloc[id]||0)+amt;});});
    const right={};heirs.forEach(h=>{right[h.id]=(engine.shares[h.id]||0)*netEstate;});
    const bal={};heirs.forEach(h=>{bal[h.id]=alloc[h.id]-right[h.id];});
    return{alloc,right,bal,settlements:settle(heirs,bal)};
  },[heirs,lands,landAllocs,engine,netEstate]);

  if(!authed) return <LoginScreen onLogin={login}/>;
  if(!isConfigured||showCfg) return <GHSettings cfg={cfg} onSave={c=>{LS.set("gh_cfg",c);setCfg(c);setShowCfg(false);}} onBack={isConfigured?()=>setShowCfg(false):null}/>;

  const canGo=[true,estate.gross>0,heirs.length>0,heirs.length>0,heirs.length>0&&lands.length>0];

  return(
    <div style={{background:"#FAF6EF",minHeight:"100vh",paddingBottom:60}}>
      <div className="no-print" style={{background:"#fff",borderBottom:"1px solid #EAE0D0",padding:"12px 20px",boxShadow:"0 1px 6px rgba(0,0,0,.06)",marginBottom:22}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🕌</span>
            <div>
              <div style={{fontWeight:800,fontSize:16}}>Islamic Inheritance — Oman</div>
              <div style={{fontSize:10,color:"#A8907A"}}>حساب الميراث الإسلامي · Husband died · Wife + Sons + Daughters · Oman RD 32/97 · {cfg.owner}/{cfg.repo}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <SyncBadge status={sync} err={syncErr}/>
            {step===5&&results&&<Btn sm v="print" onClick={()=>setShowPrint(true)}>🖨️ Reports</Btn>}
            <Btn sm v="grey" onClick={()=>setShowCfg(true)}>⚙️</Btn>
            <Btn sm v="ghost" onClick={logout}>🔒 Lock</Btn>
          </div>
        </div>
      </div>

      {sync==="loading"&&<div className="no-print" style={{textAlign:"center",padding:"60px 20px",color:"#8A7060"}}><div className="spin" style={{fontSize:32}}>⟳</div><div style={{fontWeight:600,marginTop:12}}>Loading from GitHub…</div></div>}

      {sync!=="loading"&&(
        <div style={{maxWidth:760,margin:"0 auto",padding:"0 16px"}}>
          {showPrint&&step===5&&results?(
            <PrintReports estate={estate} heirs={heirs} lands={lands} ints={ints} engine={engine} onClose={()=>setShowPrint(false)}/>
          ):(
            <div className="no-print">
              <StepBar cur={step} go={setStep} canGo={canGo}/>

              {/* ── STEP 1: ESTATE ── */}
              {step===1&&(
                <div className="fade">
                  <div style={{marginBottom:16}}>
                    <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>🏛️ Estate Information</div>
                    <div style={{fontSize:13,color:"#8A7060",lineHeight:1.7}}>
                      Per Qur'an 4:12, the wife's share — and all shares — apply to the <strong>net estate after debts and valid bequests</strong>.
                      Gross assets are not divided directly.
                    </div>
                  </div>
                  <div style={{padding:"12px 16px",background:"#F4F8FE",borderRadius:8,border:"1px solid #B0C8E0",marginBottom:16,fontSize:12,color:"#2A4060",lineHeight:1.8}}>
                    <strong>⚖️ Governing rule:</strong> Muslim estates in Oman — Islamic Sharia per Oman's Basic Statute · Personal Status Law, Royal Decree 32/97 · Shares from Qur'an 4:11–12.<br/>
                    <strong>This scenario:</strong> Husband passed away · Surviving wife (widow) + Sons + Daughters · Each son inherits twice each daughter's share.
                  </div>
                  <Card style={{marginBottom:14}}>
                    <div style={{...SL,marginBottom:14}}>Deceased</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                      <div style={{flex:"2 1 160px"}}><div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>Name of Deceased</div><Inp value={estate.deceasedName} onChange={v=>setEstate(p=>({...p,deceasedName:v}))} placeholder="Full name"/></div>
                      <div style={{flex:"1 1 140px"}}><div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>Religion</div>
                        <select value={estate.religion} onChange={e=>setEstate(p=>({...p,religion:e.target.value}))} style={{border:"1px solid #E0D4C0",borderRadius:8,padding:"9px 12px",fontSize:14,background:"#FDFAF5",color:"#2A2018",width:"100%"}}>
                          <option value="Muslim">Muslim</option>
                          <option value="Non-Muslim">Non-Muslim</option>
                        </select>
                      </div>
                    </div>
                    {estate.religion==="Non-Muslim"&&<div style={{padding:"10px 14px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",fontSize:12,color:"#8A6020",marginBottom:12}}>⚠️ Non-Muslim estates in Oman are governed by separate provisions. Islamic inheritance rules do not apply unless the heirs elect otherwise. Consult a legal advisor.</div>}
                    <div style={{...SL,marginBottom:14,marginTop:8}}>Estate Values (OMR)</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>
                      {[["Gross Estate Value","gross","Total value of all assets"],["Total Debts","debts","All outstanding debts to be settled first"],["Bequest Amount","bequest","Valid bequest (max 1/3 of estate to non-heirs)"]].map(([lbl,key,hint])=>(
                        <div key={key}>
                          <div style={{fontSize:12,color:"#8A7060",marginBottom:5}}>{lbl}</div>
                          <Inp value={estate[key]||""} onChange={v=>setEstate(p=>({...p,[key]:parseFloat(v)||0}))} placeholder="0" type="number"/>
                          <div style={{fontSize:10,color:"#A8907A",marginTop:3}}>{hint}</div>
                        </div>
                      ))}
                    </div>
                    {estate.bequest>0&&(
                      <div style={{marginTop:12,padding:"10px 14px",background:"#F4F8FE",borderRadius:8,border:"1px solid #B0C8E0",fontSize:12,color:"#3A5A7A"}}>
                        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                          <input type="checkbox" checked={estate.bequestIsHeir} onChange={e=>setEstate(p=>({...p,bequestIsHeir:e.target.checked}))} style={{width:16,height:16}}/>
                          Bequest is in favour of an heir (requires consent of all other adult heirs under Oman law — bequest will not be deducted from net estate)
                        </label>
                      </div>
                    )}
                    {estate.gross>0&&(
                      <div style={{marginTop:14,padding:"12px 16px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{fontSize:13,color:"#8A6020"}}>
                          Net Distributable Estate
                          <div style={{fontSize:11,color:"#A8907A",marginTop:2}}>= {fmtOMR(estate.gross)} − debts {fmtOMR(estate.debts)}{!estate.bequestIsHeir&&estate.bequest>0?` − bequest ${fmtOMR(estate.bequest)}`:""}</div>
                        </div>
                        <div style={{fontWeight:800,fontSize:18,color:"#6A4810"}}>{fmtOMR(netEstate)}</div>
                      </div>
                    )}
                  </Card>
                  {/* Example validator */}
                  <div style={{padding:"12px 14px",background:"#F0F7EE",borderRadius:8,border:"1px solid #A0C890",marginBottom:14,fontSize:12,color:"#2A5030",lineHeight:1.7}}>
                    <strong>📐 Example check (1 wife + 6 sons + 4 daughters, net = OMR 134,700):</strong><br/>
                    Wife = OMR 16,837.500 (1/8 = 12.5%) · Each son = OMR 14,732.813 (7/64 = 10.9375%) · Each daughter = OMR 7,366.406 (7/128 = 5.46875%)
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end"}}><Btn onClick={()=>setStep(2)} disabled={estate.gross<=0}>Next: Add Heirs →</Btn></div>
                </div>
              )}

              {/* ── STEP 2: HEIRS ── */}
              {step===2&&(
                <div className="fade">
                  <div style={{marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>👨‍👩‍👧‍👦 Heir List</div>
                    <div style={{fontSize:13,color:"#8A7060"}}>Add <strong>every heir</strong>. In Islamic inheritance, adding or removing one heir changes everyone's share.</div>
                  </div>
                  <div style={{padding:"12px 16px",background:"#EEF8F2",borderRadius:8,border:"2px solid #7DC49A",marginBottom:14,lineHeight:1.8}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#2A6840",marginBottom:6}}>✅ Your Scenario</div>
                    <div style={{fontSize:13,color:"#2A4030"}}>
                      The <strong>husband / father has passed away.</strong><br/>
                      His heirs are: his <strong>wife (widow)</strong> + their <strong>sons</strong> + their <strong>daughters</strong>.<br/>
                      The sons and daughters are heirs as <em>children of the deceased</em> — not as brothers/sisters.<br/>
                      In Islamic inheritance law, they inherit as <strong>Sons (ابن)</strong> and <strong>Daughters (بنت)</strong>.
                    </div>
                  </div>
                  <Card style={{marginBottom:14}}>
                    <div style={SL}>{editH?"✏️ Edit":"Add a Heir"}</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      <Inp value={hName} onChange={setHName} placeholder="Full name" style={{flex:"1 1 150px"}}/>
                      <select value={hRole} onChange={e=>setHRole(e.target.value)} style={{flex:"1 1 210px",border:"1px solid #E0D4C0",borderRadius:8,padding:"9px 12px",fontSize:13,background:"#FDFAF5",color:"#2A2018"}}>
                        <optgroup label="── Main Heirs (Husband died) ──">
                          <option value="wife">{ROLE.wife.emoji} {ROLE.wife.label}</option>
                          <option value="son">{ROLE.son.emoji} {ROLE.son.label}</option>
                          <option value="daughter">{ROLE.daughter.emoji} {ROLE.daughter.label}</option>
                        </optgroup>
                        <optgroup label="── If wife died instead ──">
                          <option value="husband">{ROLE.husband.emoji} {ROLE.husband.label}</option>
                        </optgroup>
                        <optgroup label="── Parents of Deceased ──">
                          <option value="father">{ROLE.father.emoji} {ROLE.father.label}</option>
                          <option value="mother">{ROLE.mother.emoji} {ROLE.mother.label}</option>
                        </optgroup>
                        <optgroup label="── Grandchildren (Son's children) ──">
                          <option value="grandson">{ROLE.grandson.emoji} {ROLE.grandson.label}</option>
                          <option value="granddaughter">{ROLE.granddaughter.emoji} {ROLE.granddaughter.label}</option>
                        </optgroup>
                        <optgroup label="── Grandparents ──">
                          <option value="pgrandfather">{ROLE.pgrandfather.emoji} {ROLE.pgrandfather.label}</option>
                          <option value="mgrandmother">{ROLE.mgrandmother.emoji} {ROLE.mgrandmother.label}</option>
                          <option value="pgrandmother">{ROLE.pgrandmother.emoji} {ROLE.pgrandmother.label}</option>
                        </optgroup>
                        <optgroup label="── Siblings of Deceased (only if no children) ──">
                          <option value="fullbrother">{ROLE.fullbrother.emoji} {ROLE.fullbrother.label}</option>
                          <option value="fullsister">{ROLE.fullsister.emoji} {ROLE.fullsister.label}</option>
                          <option value="consbrother">{ROLE.consbrother.emoji} {ROLE.consbrother.label}</option>
                          <option value="conssister">{ROLE.conssister.emoji} {ROLE.conssister.label}</option>
                          <option value="uterinesib">{ROLE.uterinesib.emoji} {ROLE.uterinesib.label}</option>
                        </optgroup>
                      </select>
                      {editH?<><Btn v="green" onClick={()=>saveH(editH)}>Save</Btn><Btn v="grey" sm onClick={()=>{setEditH(null);setHName("");setHRole("son");}}>Cancel</Btn></>:<Btn v="green" onClick={addHeir} disabled={!hName.trim()}>+ Add</Btn>}
                    </div>
                  </Card>
                  {heirs.length>0&&(
                    <Card style={{marginBottom:16}}>
                      <div style={{...SL,marginBottom:12}}>Heirs ({heirs.length}) — Calculated Shares</div>
                      {heirs.map(h=>{const r=ROLE[h.role],sh=engine.shares[h.id]||0;return(
                        <div key={h.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#FAF6EF",borderRadius:8,border:`1px solid ${editH===h.id?"#B03818":"#EAE0D0"}`,marginBottom:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:20}}>{r.emoji}</span>
                            <div>
                              <div style={{fontWeight:700,fontSize:14}}>{h.name}</div>
                              <div style={{fontSize:11,color:"#A8907A"}}>{r.label}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            {sh>0&&(
                              <div style={{textAlign:"right"}}>
                                <div style={{fontWeight:700,color:r.color,fontSize:14}}>{engine.fracs[h.id]||"0"}</div>
                                <div style={{fontSize:11,color:"#8A7060"}}>{fmtPct2(sh)} · {fmtOMR(sh*netEstate)}</div>
                              </div>
                            )}
                            {sh===0&&<span style={{fontSize:11,color:"#C08060",background:"#FEF0E8",border:"1px solid #E8C0A8",borderRadius:6,padding:"2px 8px"}}>Blocked / 0%</span>}
                            <button onClick={()=>startH(h)} style={{background:"none",border:"1px solid #DDD4C4",borderRadius:6,cursor:"pointer",color:"#8A7060",fontSize:12,padding:"3px 8px"}}>✏️</button>
                            <button onClick={()=>setHeirs(p=>p.filter(x=>x.id!==h.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#D4907A",fontSize:16}}>✕</button>
                          </div>
                        </div>
                      );})}
                      {engine.warnings.length>0&&(
                        <div style={{marginTop:10,padding:"10px 14px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",fontSize:12,color:"#8A6020"}}>
                          {engine.warnings.map((w,i)=><div key={i} style={{marginBottom:i<engine.warnings.length-1?6:0}}>⚠️ {w}</div>)}
                        </div>
                      )}
                      <div style={{marginTop:12,padding:"10px 14px",background:"#F5EDE6",borderRadius:8,border:"1px solid #E8D4C0",fontSize:11,color:"#8A7060"}}>
                        <strong>Legal basis per heir:</strong>
                        {heirs.filter(h=>engine.basis[h.id]).map(h=><div key={h.id} style={{marginTop:4}}><span style={{color:ROLE[h.role].color,fontWeight:600}}>{h.name}:</span> {engine.basis[h.id]}</div>)}
                      </div>
                    </Card>
                  )}
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <Btn v="ghost" onClick={()=>setStep(1)}>← Estate</Btn>
                    <Btn onClick={()=>setStep(3)} disabled={heirs.length===0}>Next: Confirm Heirs →</Btn>
                  </div>
                </div>
              )}

              {/* ── STEP 3: CONFIRMATION ── */}
              {step===3&&(
                <div className="fade">
                  <div style={{marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>✅ Confirm All Heirs</div>
                    <div style={{fontSize:13,color:"#8A7060",lineHeight:1.7}}>
                      Answer <strong>every question below</strong>. The result cannot be marked final until all are answered.<br/>
                      In Islamic inheritance, one additional heir — especially father, mother, or a second wife — changes the entire distribution under the same Qur'anic rules.
                    </div>
                  </div>
                  <div style={{padding:"10px 16px",background:"#FFF4EE",borderRadius:8,border:"1px solid #E8C090",marginBottom:14,fontSize:12,color:"#8A4020",lineHeight:1.7}}>
                    <strong>Reminder — your scenario:</strong> The <strong>husband died</strong>. His wife is alive. Their sons and daughters are alive.
                    The sons and daughters are heirs as <strong>children of the deceased</strong> — inheritance law does not call them brothers and sisters; it calls them <strong>sons (أبناء)</strong> and <strong>daughters (بنات)</strong>.
                  </div>
                  <Card style={{marginBottom:16}}>
                    <div style={{...SL,marginBottom:14}}>Heir Presence Checklist</div>
                    {/* Critical heirs first */}
                    <div style={{fontSize:11,fontWeight:700,color:"#B03818",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>⚠️ Critical — These heirs change ALL shares</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                      {CONFIRM_LIST.filter(c=>c.critical).map(c=>{
                        const hasInList=heirs.some(h=>h.role===c.key);
                        const ans=confirmed[c.key];
                        return(
                          <div key={c.key} style={{borderRadius:8,border:`2px solid ${ans===true?"#7DC49A":ans===false?"#EAE0D0":"#F0A070"}`,overflow:"hidden"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:ans===true?"#ECF6F0":ans===false?"#FAF6EF":"#FFF4EE",gap:10}}>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,color:"#2A2018",fontWeight:600}}>
                                  {ROLE[c.key]?.emoji} {c.q}
                                  {hasInList&&<span style={{marginLeft:8,fontSize:11,color:"#2A6840",background:"#ECF6F0",border:"1px solid #7DC49A",borderRadius:10,padding:"1px 8px"}}>✓ Added</span>}
                                </div>
                                {ans==null&&<div style={{fontSize:11,color:"#B05020",marginTop:3}}>⚠️ {c.note}</div>}
                              </div>
                              <div style={{display:"flex",gap:6,flexShrink:0}}>
                                <button onClick={()=>setConfirmed(p=>({...p,[c.key]:true}))} style={{padding:"5px 14px",borderRadius:6,border:`2px solid ${ans===true?"#2A6840":"#C0C0C0"}`,background:ans===true?"#2A6840":"#fff",color:ans===true?"#fff":"#666",cursor:"pointer",fontWeight:700,fontSize:12}}>Yes</button>
                                <button onClick={()=>setConfirmed(p=>({...p,[c.key]:false}))} style={{padding:"5px 14px",borderRadius:6,border:`2px solid ${ans===false?"#B03818":"#C0C0C0"}`,background:ans===false?"#B03818":"#fff",color:ans===false?"#fff":"#666",cursor:"pointer",fontWeight:700,fontSize:12}}>No</button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontSize:11,fontWeight:700,color:"#6A5A48",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Other Potential Heirs</div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {CONFIRM_LIST.filter(c=>!c.critical).map(c=>{
                        const hasInList=heirs.some(h=>h.role===c.key);
                        const ans=confirmed[c.key];
                        return(
                          <div key={c.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",background:ans===true?"#ECF6F0":ans===false?"#FAF6EF":"#FDFAF5",borderRadius:8,border:`1px solid ${ans===true?"#7DC49A":ans===false?"#EAE0D0":"#E0D4C0"}`,gap:10}}>
                            <div style={{flex:1,fontSize:12,color:"#2A2018"}}>
                              {ROLE[c.key]?.emoji} {c.q}
                              {hasInList&&<span style={{marginLeft:8,fontSize:11,color:"#2A6840",background:"#ECF6F0",border:"1px solid #7DC49A",borderRadius:10,padding:"1px 8px"}}>✓ Added</span>}
                            </div>
                            <div style={{display:"flex",gap:6,flexShrink:0}}>
                              <button onClick={()=>setConfirmed(p=>({...p,[c.key]:true}))} style={{padding:"4px 12px",borderRadius:6,border:`2px solid ${ans===true?"#2A6840":"#C0C0C0"}`,background:ans===true?"#2A6840":"#fff",color:ans===true?"#fff":"#666",cursor:"pointer",fontWeight:600,fontSize:11}}>Yes</button>
                              <button onClick={()=>setConfirmed(p=>({...p,[c.key]:false}))} style={{padding:"4px 12px",borderRadius:6,border:`2px solid ${ans===false?"#B03818":"#C0C0C0"}`,background:ans===false?"#B03818":"#fff",color:ans===false?"#fff":"#666",cursor:"pointer",fontWeight:600,fontSize:11}}>No</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{marginTop:14,padding:"10px 14px",background:allConfirmed?"#ECF6F0":"#FFF8EE",borderRadius:8,border:`1px solid ${allConfirmed?"#7DC49A":"#E8D898"}`,fontSize:12,color:allConfirmed?"#2A6840":"#8A6020",fontWeight:600}}>
                      {allConfirmed?"✅ All heirs confirmed — result will be definitive.":"⚠️ "+CONFIRM_LIST.filter(c=>confirmed[c.key]==null).length+" questions unanswered — result will be marked PROVISIONAL."}
                    </div>
                  </Card>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <Btn v="ghost" onClick={()=>setStep(2)}>← Heirs</Btn>
                    <Btn onClick={()=>setStep(4)}>Next: Lands →</Btn>
                  </div>
                </div>
              )}

              {/* ── STEP 4: LANDS ── */}
              {step===4&&(
                <div className="fade">
                  <div style={{marginBottom:14}}><div style={{fontWeight:700,fontSize:18,marginBottom:4}}>🏡 Inherited Lands</div><div style={{fontSize:13,color:"#8A7060"}}>Add all land properties.</div></div>
                  <Card style={{marginBottom:14}}>
                    <div style={SL}>{editL?"✏️ Edit":"Add a Land"}</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      <Inp value={lName} onChange={setLName} placeholder="Land name" style={{flex:"2 1 140px"}}/>
                      <Inp value={lLoc}  onChange={setLLoc}  placeholder="Location (optional)" style={{flex:"2 1 130px"}}/>
                      <Inp value={lVal}  onChange={setLVal}  placeholder="Value (OMR)" type="number" style={{flex:"1 1 110px"}}/>
                      {editL?<><Btn v="green" onClick={()=>saveL(editL)}>Save</Btn><Btn v="grey" sm onClick={()=>{setEditL(null);setLName("");setLVal("");setLLoc("");}}>Cancel</Btn></>:<Btn v="green" onClick={addLand} disabled={!lName.trim()||!lVal}>+ Add</Btn>}
                    </div>
                  </Card>
                  {lands.length>0&&(
                    <Card style={{marginBottom:16}}>
                      <div style={{...SL,marginBottom:12}}>Lands ({lands.length})</div>
                      {lands.map((l,i)=>(
                        <div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:i%2===0?"#FAF6EF":"#fff",borderRadius:8,border:`1px solid ${editL===l.id?"#B03818":"#EAE0D0"}`,marginBottom:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>🗺️</span><div><div style={{fontWeight:700,fontSize:14}}>{l.name}</div><div style={{fontSize:12,color:"#8A7060"}}>{l.loc&&<span style={{marginRight:8}}>📍{l.loc}</span>}<strong style={{color:"#B03818"}}>{fmtOMR(l.value)}</strong></div></div></div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>startL(l)} style={{background:"none",border:"1px solid #DDD4C4",borderRadius:6,cursor:"pointer",color:"#8A7060",fontSize:12,padding:"3px 8px"}}>✏️</button>
                            <button onClick={()=>setLands(p=>p.filter(x=>x.id!==l.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#D4907A",fontSize:16}}>✕</button>
                          </div>
                        </div>
                      ))}
                      <div style={{marginTop:10,padding:"10px 14px",background:"#FFF8EE",borderRadius:8,border:"1px solid #E8D898",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#8A6020"}}>Total Land Value</span><span style={{fontWeight:800,fontSize:16,color:"#6A4810"}}>{fmtOMR(lands.reduce((s,l)=>s+l.value,0))}</span></div>
                    </Card>
                  )}
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <Btn v="ghost" onClick={()=>setStep(3)}>← Confirm</Btn>
                    <Btn onClick={()=>setStep(5)} disabled={lands.length===0}>Next: Interests →</Btn>
                  </div>
                </div>
              )}

              {/* ── STEP 5: INTERESTS + RESULTS ── */}
              {step===5&&(
                <div className="fade">
                  {/* Provisional warning */}
                  {isProvisional&&(
                    <div style={{padding:"12px 16px",background:"#FFF8EE",borderRadius:10,border:"2px solid #E8D898",marginBottom:16,fontSize:13,color:"#8A5020"}}>
                      <strong>⚠️ PROVISIONAL RESULT</strong> — Heir confirmation incomplete. Go back to Step 3 to confirm all heirs.
                      Under Islamic law, one missing heir can change everyone's share. Do not use for legal purposes until all confirmed.
                    </div>
                  )}

                  {/* Assumptions block — per approved spec */}
                  {(()=>{
                    const wives=heirs.filter(h=>h.role==="wife");
                    const sons=heirs.filter(h=>h.role==="son");
                    const daughters=heirs.filter(h=>h.role==="daughter");
                    const hasOther=heirs.some(h=>!["wife","son","daughter"].includes(h.role));
                    const isWidow=wives.length>0&&sons.length>0&&!hasOther;
                    const caseName=wives.length===1&&sons.length===6&&daughters.length===4&&!hasOther?"widow_6sons_4daughters_only":isWidow?`widow_${sons.length}sons_${daughters.length}daughters`:"custom_case";
                    return(
                      <Card style={{marginBottom:14,border:"1px solid #C0D4E8",background:"#F4F8FE"}}>
                        <div style={{...SL,color:"#1A4F7A",marginBottom:10}}>📋 Assumptions — {caseName}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
                          {[
                            ["Jurisdiction","Oman (Royal Decree 32/97)"],
                            ["Religion","Muslim"],
                            ["Deceased","Male (husband)"],
                            ["Wife count",`${wives.length} wife${wives.length!==1?"s":""}`],
                            ["Sons",sons.length],
                            ["Daughters",daughters.length],
                            ["Net estate",fmtOMR(netEstate)],
                            ["Other heirs",hasOther?"Yes — see above":"None affecting result"],
                          ].map(([l,v])=>(
                            <div key={l} style={{background:"#fff",border:"1px solid #B0C8E0",borderRadius:8,padding:"5px 12px",fontSize:12}}>
                              <span style={{color:"#6A8AAA",fontWeight:600}}>{l}:</span> <span style={{color:"#1A3050",fontWeight:700}}>{v}</span>
                            </div>
                          ))}
                        </div>
                        {wives.length===1&&sons.length>0&&daughters.length>0&&!hasOther&&(
                          <div style={{fontSize:12,color:"#2A5080",background:"#E8F2FA",borderRadius:6,padding:"8px 12px",lineHeight:1.6}}>
                            <strong>Rule applied:</strong> Wife = 1/8 (children exist, Qur'an 4:12) · Remainder 7/8 → children as عصبة · Each son = 2× each daughter (Qur'an 4:11)
                            <br/><strong>Units:</strong> ({sons.length}×2) + ({daughters.length}×1) = {sons.length*2+daughters.length} total units · Each son = 2/{sons.length*2+daughters.length} of 7/8 · Each daughter = 1/{sons.length*2+daughters.length} of 7/8
                            {!allConfirmed&&<><br/><span style={{color:"#B05020",fontWeight:600}}>⚠️ Result valid only if no father, no mother, no additional wives, no other heirs confirmed absent.</span></>}
                          </div>
                        )}
                      </Card>
                    );
                  })()}

                  {/* Islamic shares summary */}
                  <Card style={{marginBottom:16,border:"1px solid #D4E8C4",background:"#F4FAF0"}}>
                    <div style={{...SL,color:"#2A6840",marginBottom:12}}>📖 Islamic Shares Applied (فرائض)</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}>
                        <thead><tr style={{background:"#EEF8E8"}}>{["Heir","Role","Fraction","Share %","Amount (OMR)","Legal Basis"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:h==="Heir"?"left":"center",fontWeight:700,color:"#2A6840",fontSize:11,textTransform:"uppercase",letterSpacing:".04em",whiteSpace:"nowrap",borderBottom:"2px solid #A0C890"}}>{h}</th>)}</tr></thead>
                        <tbody>
                          {heirs.map((h,i)=>{
                            const r=ROLE[h.role],sh=engine.shares[h.id]||0;
                            return(
                              <tr key={h.id} style={{background:i%2===0?"#F8FBF6":"#fff",borderBottom:"1px solid #E0ECD8"}}>
                                <td style={{padding:"9px 10px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:17}}>{r.emoji}</span><div><div style={{fontWeight:700,fontSize:13}}>{h.name}</div></div></div></td>
                                <td style={{padding:"9px 10px",textAlign:"center",fontSize:11,color:r.color,fontWeight:600}}>{r.short}</td>
                                <td style={{padding:"9px 10px",textAlign:"center",fontWeight:800,fontSize:15,color:"#1A4F2A"}}>{engine.fracs[h.id]||"0"}</td>
                                <td style={{padding:"9px 10px",textAlign:"center",color:"#3A6830"}}>{fmtPct(sh)}</td>
                                <td style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:"#2A2018"}}>{fmtOMR(sh*netEstate)}</td>
                                <td style={{padding:"9px 10px",fontSize:11,color:"#5A7850",fontStyle:"italic",maxWidth:180}}>{engine.basis[h.id]||"—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot><tr style={{background:"#FFF8EE",borderTop:"2px solid #C8A840"}}><td colSpan={4} style={{padding:"9px 10px",fontWeight:700,color:"#6A4810",fontSize:13}}>Net Distributable Estate</td><td style={{padding:"9px 10px",textAlign:"center",fontWeight:800,fontSize:15,color:"#6A4810"}}>{fmtOMR(netEstate)}</td><td/></tr></tfoot>
                      </table>
                    </div>
                    <div style={{marginTop:10,padding:"8px 12px",background:"#FFF8EE",borderRadius:6,border:"1px solid #E8D898",fontSize:11,color:"#8A6020"}}>
                      <strong>⚠️ Result is valid only if no other heir exists.</strong>
                      Shares change if: father is alive · mother is alive · more than one wife · any other heir present.
                      Gross: {fmtOMR(estate.gross)} · Debts: {fmtOMR(estate.debts)} · Bequest: {fmtOMR(estate.bequest)} · <strong>Net: {fmtOMR(netEstate)}</strong>
                    </div>
                  </Card>

                  {/* Land interests */}
                  <div style={{marginBottom:14,fontWeight:700,fontSize:16}}>☑️ Who Wants Which Land?</div>
                  {lands.map(land=>{
                    const intIds=Object.entries(ints[land.id]||{}).filter(([,v])=>v).map(([id])=>id);
                    const prev=intIds.length>0?divideLand(land.value,intIds,engine.shares):null;
                    return(
                      <Card key={land.id} style={{marginBottom:14}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                          <div><div style={{fontWeight:700,fontSize:15}}>🗺️ {land.name}</div><div style={{fontSize:12,color:"#8A7060",marginTop:2}}>{land.loc&&<span style={{marginRight:8}}>📍{land.loc}</span>}<strong style={{color:"#B03818"}}>{fmtOMR(land.value)}</strong></div></div>
                          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#A8907A"}}>Interested</div><div style={{fontWeight:800,fontSize:20,color:intIds.length>0?"#2A6840":"#C0907A"}}>{intIds.length}</div></div>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                          {heirs.map(h=>{const on=!!(ints[land.id]?.[h.id]),r=ROLE[h.role];return(
                            <button key={h.id} onClick={()=>toggleInt(land.id,h.id)} style={{border:`2px solid ${on?r.color:r.bd}`,background:on?r.bg:"#fff",borderRadius:10,padding:"7px 12px",cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:5,boxShadow:on?`0 2px 8px ${r.color}30`:"none",transform:on?"scale(1.03)":"scale(1)"}}>
                              <span style={{fontSize:15}}>{r.emoji}</span>
                              <div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:700,color:on?r.color:"#6A5A4A"}}>{h.name}</div><div style={{fontSize:10,color:on?r.color:"#A8907A"}}>{on?"✓ Interested":"Tap"}</div></div>
                            </button>
                          );})}
                        </div>
                        {prev&&<div style={{marginTop:10,padding:"9px 12px",background:"#F7F4EE",borderRadius:8,border:"1px solid #E8DDD0"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#8A7060",marginBottom:5}}>Live split (proportional to Islamic shares)</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{intIds.map(id=>{const h=heirs.find(x=>x.id===id),r=ROLE[h.role];return <div key={id} style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:r.bg,color:r.color,border:`1px solid ${r.bd}`,fontWeight:600}}>{h.name}: {fmtOMR(prev[id])}</div>;})}</div>
                        </div>}
                      </Card>
                    );
                  })}

                  {/* Results table */}
                  {results&&(
                    <>
                      <Card style={{marginBottom:14}}>
                        <div style={{...SL,marginBottom:12}}>💰 Allocation vs Rightful Share</div>
                        <div style={{overflowX:"auto"}}>
                          <table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}>
                            <thead><tr style={{background:"#F5EDE6"}}>{["Heir","Fraction","Rightful","Allocated","Balance"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:h==="Heir"?"left":"right",fontWeight:700,color:"#6A5A48",fontSize:11,textTransform:"uppercase",letterSpacing:".04em",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                            <tbody>
                              {heirs.map((h,i)=>{const b=results.bal[h.id],pos=b>50,neg=b<-50,r=ROLE[h.role];return(
                                <tr key={h.id} style={{background:i%2===0?"#FAF6EF":"#fff",borderBottom:"1px solid #EDE5D8"}}>
                                  <td style={{padding:"9px 10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17}}>{r.emoji}</span><div><div style={{fontWeight:700}}>{h.name}</div><div style={{fontSize:10,color:r.color}}>{r.short}</div></div></div></td>
                                  <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:"#2A6840"}}>{engine.fracs[h.id]||"0"}</td>
                                  <td style={{padding:"9px 10px",textAlign:"right",color:"#5A4A38",whiteSpace:"nowrap"}}>{fmtOMR(results.right[h.id])}</td>
                                  <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap"}}>{fmtOMR(results.alloc[h.id])}</td>
                                  <td style={{padding:"9px 10px",textAlign:"right"}}><span style={{padding:"4px 8px",borderRadius:20,fontWeight:700,fontSize:11,whiteSpace:"nowrap",background:pos?"#FEE8E0":neg?"#E8F5EE":"#F0EDE6",color:pos?"#B03818":neg?"#2A6840":"#8A7060"}}>{pos?`▲ Owes ${fmtOMR(b)}`:neg?`▼ Gets ${fmtOMR(-b)}`:"✓ Even"}</span></td>
                                </tr>
                              );})}
                            </tbody>
                            <tfoot><tr style={{background:"#FFF8EE",borderTop:"2px solid #E8D898"}}><td colSpan={2} style={{padding:"9px 10px",fontWeight:700,color:"#6A4810"}}>Net Estate</td><td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmtOMR(netEstate)}</td><td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"#6A4810",whiteSpace:"nowrap"}}>{fmtOMR(Object.values(results.alloc).reduce((a,b)=>a+b,0))}</td><td/></tr></tfoot>
                          </table>
                        </div>
                      </Card>

                      {results.settlements.length>0&&(
                        <Card style={{marginBottom:14,border:"1px solid #E8D898",background:"#FFFBF0"}}>
                          <div style={{...SL,color:"#6A4810",marginBottom:8}}>🤝 Settlement Payments Required</div>
                          {results.settlements.map((s,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",marginBottom:8,borderRadius:10,background:"#fff",border:"1px solid #E8D898"}}>
                              <span style={{fontSize:18}}>{ROLE[s.fRole].emoji}</span>
                              <div style={{flex:1,fontSize:14}}><span style={{fontWeight:700,color:ROLE[s.fRole].color}}>{s.from}</span><span style={{color:"#8A7060",margin:"0 8px"}}>pays</span><span style={{fontWeight:700,color:ROLE[s.tRole].color}}>{s.to}</span></div>
                              <span style={{fontWeight:800,fontSize:15,color:"#6A4810",background:"#FFF3D0",padding:"4px 14px",borderRadius:20,border:"1px solid #D4A840",whiteSpace:"nowrap"}}>{fmtOMR(s.amount)}</span>
                              <span style={{fontSize:18}}>{ROLE[s.tRole].emoji}</span>
                            </div>
                          ))}
                        </Card>
                      )}
                      {results.settlements.length===0&&<Card style={{marginBottom:14,border:"1px solid #A0C8B0",background:"#EEF8F2"}}><div style={{display:"flex",alignItems:"center",gap:10,color:"#2A6840"}}><span style={{fontSize:22}}>✅</span><div><div style={{fontWeight:700}}>No settlement needed</div><div style={{fontSize:12,color:"#4A8860"}}>All allocations match Islamic shares.</div></div></div></Card>}
                    </>
                  )}

                  <div style={{display:"flex",gap:10,justifyContent:"space-between",flexWrap:"wrap",marginTop:8}}>
                    <Btn v="ghost" onClick={()=>setStep(4)}>← Lands</Btn>
                    <Btn v="print" onClick={()=>setShowPrint(true)}>🖨️ Print / PDF Reports</Btn>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
